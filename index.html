<script>
const DATA={"schedule":[{"start":"06:00","end":"07:00","label":"Physical Activity","detail":"Train the body before the phone"},{"start":"07:00","end":"07:30","label":"Script Practice","detail":"Call flow reps, tonality, A→R→P drills"},{"start":"07:30","end":"11:00","label":"Call Block 1","detail":"Expireds + FSBOs","isCallBlock":true},{"start":"11:00","end":"12:00","label":"Power 30","detail":"Hot lead callbacks + lunch","isCallBlock":true},{"start":"12:00","end":"15:00","label":"Call Block 2","detail":"Circle prospecting + absentee","isCallBlock":true},{"start":"15:00","end":"16:00","label":"Follow-Up","detail":"Pipeline touches, CRM hygiene","isCallBlock":true},{"start":"16:00","end":"18:00","label":"Appointments / Call Block 3","detail":"Listing appointments or overflow dials","isCallBlock":true},{"start":"18:00","end":"19:00","label":"Dinner","detail":"Off the clock"},{"start":"19:00","end":"21:00","label":"Personal Time","detail":"Family. Recharge."},{"start":"21:00","end":"22:00","label":"Wind Down","detail":"Plan tomorrow's mission"}],"codes":{"PI":{"name":"Pattern Interrupt","short":"Lower resistance. Give control away."},"PQ":{"name":"Presumptive","short":"Assume it forward; ask the detail."},"RP":{"name":"Reverse Presumptive","short":"The takeaway. Presume the no."},"HY":{"name":"Hypothetical / Future Pace","short":"Let them live the outcome first."},"NO":{"name":"No-Oriented","short":"Frame so 'no' means yes."},"YES":{"name":"Yes-Oriented","short":"Micro-agreement. Keep momentum."},"BC":{"name":"Because","short":"The landing gear. Cut in on the pause."},"SO":{"name":"Socratic","short":"Let the market argue for you."},"PM":{"name":"Permission","short":"Control given is trust earned."},"ABC":{"name":"ABC","short":"Multiple choice. Surface the real reason."},"EM":{"name":"Emotional","short":"Find the pain. Emotion drives the decision."},"SQ":{"name":"Status Quo","short":"Challenge inaction. Can they just stay?"}},"questionTypes":[{"code":"PI","name":"Pattern Interrupts","purpose":"Break the telemarketer script in their head. Honesty + handing them the exit is what keeps them on the line.","examples":["If I told you I was a Realtor, would you hang up or would you give me 30 seconds to tell you why I called?","Look, I'll be upfront — I'm a Realtor and this is a cold call. Do you want to hang up, or will you give me 30 seconds and then decide?","Look, you're going to hate me — I'm a Realtor. Do you want to hang up, or will you give me 30 seconds to tell you why I called?","I'm a Realtor — I don't think we've spoken before. Do you want to hang up, or can I tell you why I called?","I'm a Realtor and I know this call is out of the blue, but I was hoping to ask you something really quick — would that be okay?","I'm a Realtor and I know you weren't expecting my call. Do you have 30 seconds, or would you rather hang up?","I'm a Realtor and I didn't know if I should even call you — but would you hate me if I asked you something really quick?","I'm sure you hate getting calls like this as much as I hate making them, but I was hoping to ask you something really quick — would that be okay?","Before you hang up, I was hoping to ask you something really quick — would that be okay?"]},{"code":"PQ","name":"Presumptive Questions","purpose":"Assume the thing happened and ask about the details — their correction reveals the truth.","examples":["When you vet out interested buyers before they see your home, what type of qualification documentation do you typically request?","When your agent called to tell you why the home didn't sell, what did they say?","When you interviewed the other agents and they physically took you to see the homes you'd be competing with, what did they say they'd do to make your home stand out as the obvious choice?","When your agent was presenting you with offers, was it just that the offers were too low?","When your agent was giving you feedback, what did they say they would do differently to start generating offers?"]},{"code":"RP","name":"Reverse Presumptive Questions","purpose":"The takeaway. Presume the answer you DON'T want — they argue your side for you.","examples":["I get the feeling that even if you genuinely believed I could produce a better result than any other agent, there's probably no way you'd ever meet with me, right?","If I were to say [something you don't like], you're probably going to tell me it's over, aren't you?","If I were to ask if you'd be open to selling, even for a great price, you'd probably laugh and tell me you're never selling, right?","Even if I was able to show you a way to actually get your home sold and you believed it would work, I don't suppose it would make sense for you to invite me over, am I right?","I'm guessing you're going to [do what I don't want you to do]…"]},{"code":"HY","name":"Hypothetical Questions (Future Pace)","purpose":"Let them live the outcome before committing to the step. The appointment becomes the obvious conclusion.","examples":["Let's pretend you decided to invite me over, and after you saw my plan you were blown away and genuinely believed I was the best agent to sell your home — is there any reason why you wouldn't invite me over to explore that a bit more?","If… then…","If I told you the answer, what would happen next?","Let's pretend I could — what would you do?"]},{"code":"NO","name":"\"No\"-Oriented Questions","purpose":"People protect themselves with no. Frame the ask so 'no' means yes — they stay in control, you advance.","examples":["Would it be a bad idea…","Would you hate me if…","Would you be upset if…","Would you be against…","Would you be opposed…","I don't suppose…"]},{"code":"YES","name":"\"Yes\"-Oriented Questions","purpose":"Micro-agreements that keep momentum and confirm alignment.","examples":["Is that fair?","Fair enough?","Would it make sense?","Does it make sense?"]},{"code":"BC","name":"Because Questions","purpose":"The landing gear. Pause after the future-pace, then cut in the second they speak.","examples":["Because, let's face it, you're not going to do anything unless it makes sense, right?","Because, let's face it, you're going to do what's best for you and your family, right?","Because, let's face it, if you don't feel as though I'm the right agent for you, I'm sure you're going to tell me, right?","Because, let's face it, if after you hired me you didn't feel like I was doing my job, you'd fire me, right?","Because, let's be real, there's no way you'd hire me unless you felt 100% confident I could get you a better result than any other agent, right?"]},{"code":"SO","name":"Socratic Questions","purpose":"Let the market argue for you. They reach the conclusion themselves — and own it.","examples":["If you were the buyer looking at a home that had been sitting on the market for a long time and wanted to make an offer, what type of offer would you make?","The average time to sell a home like yours is 27 days. If we end up sitting on the market much longer than that, what is the market trying to tell us?","What do you mean?"]},{"code":"PM","name":"Permission Questions","purpose":"Control given is trust earned. Every pivot starts with permission.","examples":["Would that be okay?","Are you comfortable with that?","It's totally up to you.","What would you like to do next?","Where should we go from here?","Can I ask you a blunt question?","Can I share my biggest fear?","I want to ask you something, but I'm afraid of how you might respond…"]},{"code":"ABC","name":"ABC Questions","purpose":"Offer A, B, or 'something else' — the multiple choice surfaces the real reason fast.","examples":["Is that because you didn't get any offers, the offers were too low, or was it something else?","Is that because you've given up on the idea of moving, you don't believe there's a buyer for your home, or is it something else?","Is that because you feel obligated to work with them, you don't feel like anyone can do any better, or is it something else?"]},{"code":"EM","name":"Emotional Questions","purpose":"Emotional motivation drives the decision. Dig until you feel it.","examples":["How does that make you feel?","What do you feel should have been done or not done?","How long has this been happening?","When did you first recognize this was a problem?","What actions did you take with your previous agent to get things back on track?","What type of impact has this had?","Have you lost all hope?"]},{"code":"SQ","name":"Status Quo Questions","purpose":"Test whether staying put is actually an option — real motivation can't say yes.","examples":["Is it an option to just stay put and not sell?","What are you looking for that you don't already have?","What's wrong with where you live now?","Is renting it an option?"]}],"principles":[{"title":"People don't like being sold","body":"They like discovering their own reasons for deciding. Your job is to surface those reasons, not supply them."},{"title":"Curiosity over persuasion","body":"You're a diagnostic questioning expert, not a persuader. Ask. Let them arrive at the conclusion."},{"title":"Qualification over convincing","body":"You're deciding whether THEY are a fit — not the other way around. That posture is what creates the trust."},{"title":"The seller talks 70%","body":"Less talking, more questions. Silence after a question is a tool — let it sit, they fill it."},{"title":"Give control away","body":"Hand them the exit, the permission, the 'no'. Control given is trust earned. Neediness kills the call."},{"title":"Emotion drives the decision","body":"Logic justifies it later. Dig for motivation, pain, timeline, and the desired outcome before you recommend anything."},{"title":"Never push, pressure, argue, or convince","body":"Every objection ends in forward movement, never a debate. Resolve, then advance."},{"title":"The goal isn't dials","body":"It's appointments held → listings taken → closings. Everything points one direction."}],"flow":[{"n":1,"stage":"Pattern Interrupt","codes":["PI"],"detail":"Break the script in their head. Honesty + the exit keeps them on the line."},{"n":2,"stage":"Reverse Presumptive","codes":["RP"],"detail":"The takeaway. Presume the no — they correct you and open up on their own."},{"n":3,"stage":"Discovery","codes":["ABC","PQ","SQ"],"detail":"Diagnose: motivation, timeline, obstacles. ABC and presumptive questions make answering easy."},{"n":4,"stage":"Emotional Discovery","codes":["EM"],"detail":"Find the pain. Repeat their emotional words back. This is the motivation signal."},{"n":5,"stage":"Status Quo Challenge","codes":["SQ","SO"],"detail":"Could they just stay? Let the market and their own logic challenge the inaction."},{"n":6,"stage":"Future Pace","codes":["HY"],"detail":"Let them live the solved outcome. The appointment becomes the obvious next step."},{"n":7,"stage":"Commitment Bridge","codes":["NO","BC"],"detail":"No-oriented ask + the Because. Pause, then cut in the second they speak."},{"n":8,"stage":"Day Close","codes":["PM","YES"],"detail":"Move to logistics, not persuasion. Lock the day, qualify the appointment, confirm."}],"scripts":[{"id":"expired","name":"Expired","goal":"Book the listing consult. (Backup: qualified lead + permission to follow up.)","mindset":"Curious · calm · zero pressure. Less talking, more questions. Let silence work.","steps":[{"n":1,"label":"Pattern Interrupt","tags":["PI"],"script":"Hi, is this Tom? … Tom, this is Mark. Look, I'll be upfront — I'm a Realtor, and before you hang up, I was hoping to ask you something real quick. Would that be okay?","note":"Pause — let him answer. You just handed him control; that's what disarms him."},{"n":2,"label":"Assumptive Hook","tags":["PQ"],"script":"I appreciate that. I was calling about the home on ABC Street — saw it came off the market. I'm assuming that's because you already sold it, right?","note":"He'll usually correct you: \"No, it didn't sell.\""},{"n":3,"label":"ABC Question","tags":["ABC"],"script":"Interesting. Is that because you didn't get any offers, the offers came in too low, or was it something else?","note":"Let him talk. Do not fill the silence."},{"n":4,"label":"Emotional Dig","tags":["EM"],"script":"And when your agent let you know it was coming off the market, what'd they say was the reason it didn't sell?","note":"Listen for frustration / blame / confusion — that's your motivation signal."},{"n":5,"label":"Discovery","tags":["SQ","EM"],"script":"When you first decided to sell — where were you hoping to head to, Tom? … And how soon did you need to be there? … What do you think kept it from selling? … If you could wave a wand and have this handled — what's that look like?","note":"Motivation · timeline · obstacle · desired outcome. Ask, never pitch."},{"n":6,"label":"Relationship Check","tags":["PM","ABC"],"script":"Can I ask you something, Tom — and I don't want to step on any toes — are you planning to relist with the same agent, or are you weighing your options?","note":"Permission-based. You're mapping the decision, not pitching."},{"n":7,"label":"Appointment Close","tags":["PM","HY","NO","BC"],"script":"Look, I'll be upfront — I don't know if I'm the right agent for you; you'll decide that. But let's pretend we met, and after you saw my plan you genuinely believed I could sell your home and get you to [Tom's outcome]… would there be any reason you wouldn't at least want to explore it? … Because — let's face it, Tom, you're not gonna do anything unless it makes sense, right? … Great — does [day] at [time] work, or would [alt] be better?","note":"Autonomy → future-pace → no-oriented → Because. Pause, then cut in the second he speaks. Close the day."}],"master":[{"n":1,"tags":[],"script":"Hi, is this [Name]?"},{"n":2,"tags":["PI"],"script":"[Name], this is Mark. Look, I'll be upfront, I'm a Realtor, and before you hang up, I was hoping to ask you something really quick, would that be ok?"},{"n":3,"tags":["PQ"],"script":"I appreciate that. Well, I was calling about the home on ABC Street and saw it had come off the market. I'm assuming that's because you sold it, right?"},{"n":4,"tags":["ABC"],"script":"Interesting. Is that because you didn't get any offers, the offers were too low, or was it something else?"},{"n":5,"tags":["PQ","EM"],"script":"And when your agent called you to let you know that the home was coming off the market, what was the reason they said the home didn't sell? — Can I ask you something about that… but before I do, I don't want to step on anyone's toes, your previous agent wasn't like your sister-in-law was it? — That sounds frustrating, what do you feel they should have done differently?"},{"n":6,"tags":["SQ"],"script":"Ok, and this is probably a weird question, but the home looks great and you're in a prime area that most people want — out of curiosity, is it an option to just stay there?"},{"n":7,"tags":["NO"],"script":"And [Name], let me ask you this, at this point, have you just given up on the idea that there's a buyer out there that would actually buy your house?"},{"n":8,"tags":["RP"],"script":"I see… and I get the feeling that even if you got an offer with the price and terms you originally wanted, or more, that's probably not something you'd even consider at this point, right?"},{"n":9,"tags":["PM"],"script":"Well [Name], before I let you go, can I make a quick recommendation?"},{"n":10,"tags":["YES"],"script":"Ok, and if what I'm about to ask you doesn't make sense, you'll tell me right?"},{"n":11,"tags":["HY","BC"],"script":"Ok, well let's pretend we met, and after you saw my plan, it was different than anything you've ever seen before, and you genuinely believed I could get your home sold and help you get the [desired outcome], is there any reason why you wouldn't invite me over to just explore this a bit more… (Pause — the second they speak, cut in) Because, I mean, let's face it, you're not going to do anything unless it makes sense, right?"},{"n":12,"tags":["PM"],"script":"Ok, fine, then what day are you thinking would make sense for us to get together?"},{"n":13,"tags":["NO"],"script":"Ok, I could probably make that work, and in the meantime, would it be helpful if I emailed you a copy of my resume which will answer most of the questions you probably have about me, or would you just delete it?"}],"routing":[{"situation":"Interested","action":"Book appt — confirm address, who's there, time"},{"situation":"Warm, not now","action":"Get permission + set the follow-up date"},{"situation":"Not selling","action":"Ask for a referral, log + nurture"},{"situation":"Hostile / DNC","action":"Mark it, move on"}]},{"id":"fsbo","name":"FSBO","goal":"Book the listing consult. (Backup: qualified lead + permission to follow up.)","mindset":"Curious · low-pressure · genuinely helpful. Relationship before presentation.","steps":[{"n":1,"label":"Pattern Interrupt","tags":["PI"],"script":"Hi, is this Tom? … Tom, this is Mark. Listen, you're gonna hate me — I'm a Realtor. Do you want to hang up, or give me 30 seconds and then decide?","note":"Pause. You handed him the exit — that's what keeps him on the line."},{"n":2,"label":"Reverse Presumptive","tags":["RP"],"script":"I appreciate that. Look — I see you're selling on your own, which I respect. It's priced really well… so I get the feeling you already have multiple offers, or it's already sold. Fair?","note":"He'll correct you — that's him opening up on his own."},{"n":3,"label":"ABC Question","tags":["ABC"],"script":"Interesting. Is that because you didn't get any offers, the offers came in too low, or was it something else?","note":"Let him talk. Do not fill the silence."},{"n":4,"label":"Buyer-Intro Opener","tags":["NO"],"script":"I only ask because homes like yours often move fast. Not that I have one right now — but if I came across a buyer interested in your home, would you be upset if I introduced them?","note":"Gets an easy yes and cracks the door to a conversation."},{"n":5,"label":"Discovery","tags":["SQ"],"script":"What are you hoping for that you don't already have — could you just stay and not sell? … How long are you planning to try on your own before you'd consider other options? … If 30 days go by and you don't get the offer you want — what would you do at that point? … If you got an offer right away with the price and terms you wanted — a problem, or do you already have your next place lined up?","note":"Motivation · timeline · future consequence · readiness."},{"n":6,"label":"Permission to Close","tags":["PM"],"script":"Can I ask you one last question before I let you go?"},{"n":7,"label":"Appointment Close","tags":["HY","NO","BC"],"script":"Let's pretend we met, and after you saw my plan you genuinely believed I could sell your home and help you net the money you need / get to your next place — would there be any reason you wouldn't invite me over just to explore it a bit more… Because — let's face it, Tom, you're not gonna do anything unless it makes sense, right? … What day makes sense for us to get together? … Would it help if I emailed my resume — or would you just delete it?","note":"Autonomy → future-pace → Because → close the day."}],"master":[{"n":1,"tags":[],"script":"Hi, is this [Name]?"},{"n":2,"tags":["PI"],"script":"[Name], this is Mark. Listen, you're going to hate me, I'm a Realtor. Do you want to hang up, or will you give me 30 seconds and then decide?"},{"n":3,"tags":["RP"],"script":"I appreciate that. Well, look, I see you're selling your home on your own — which I respect — it's priced really well, and so I get the feeling you already have multiple offers, or the home is sold, would that be fair?"},{"n":4,"tags":["ABC"],"script":"Interesting, is that because you didn't get any offers, the offers were too low, or was it something else?"},{"n":5,"tags":["NO"],"script":"I only ask because homes like yours typically sell within hours of hitting the market, but I was calling to find out. Not that I have one right now, but if I came across a buyer that was interested in your home, would you be upset if I were to introduce them to you?"},{"n":6,"tags":["SQ"],"script":"Ok, great. And this is probably a weird question, but I'm looking at the photos, the home looks perfect and you're in a prime location that most people want — I'm just curious, what are you looking for that you don't already have, I mean, could you just stay there and not sell?"},{"n":7,"tags":["NO"],"script":"Ok, fair enough. And I'm sure you're not in a rush to sell, but ideally, if you were to get an offer right away that had the price and terms you wanted, would that be a problem or do you already have your next place lined up?"},{"n":8,"tags":["PM"],"script":"Can I ask you one last question before I let you go?"},{"n":9,"tags":["NO"],"script":"Ok, well, if 30 days goes by and you still haven't sold on your own, would you hate the idea of us talking again to discuss some other options in the future?"},{"n":10,"tags":["PM"],"script":"Ok, fair enough and look, can I share with you my biggest fear?"},{"n":11,"tags":["RP"],"script":"Yeah, I kind of get the feeling that, if I were to ask you to get together now, and I could show you how I could sell your home, net you the money you need and remove the stress of selling on your own, you'd probably just laugh at me and wouldn't even consider it, right?"},{"n":12,"tags":["HY","BC"],"script":"Well look, I'm not sure if this makes sense or not, but, let's pretend we did meet now, and after you saw my plan, you genuinely believed I could sell your home and get you the money you need, is there any reason why you wouldn't invite me over to just explore this a bit more… (Pause, then cut in) Because, I mean, let's face it, you're not going to do anything unless it makes sense, right?"},{"n":13,"tags":["PM"],"script":"Ok fine, then what day are you thinking would make sense for us to get together?"},{"n":14,"tags":["NO"],"script":"Ok I could probably make that work, and in the meantime, would it be helpful if I emailed you a copy of my resume which will answer most of the questions you probably have about me, or would you just end up deleting it?"}],"routing":[{"situation":"Appt set","action":"Confirm address + day/time"},{"situation":"\"Try on our own\"","action":"Plant consequence + set follow-up"},{"situation":"Won't commit","action":"Quality Lead script + follow-up"},{"situation":"Hard no / DNC","action":"Mark it, move on"}]},{"id":"absentee","name":"Absentee","goal":"Book the listing consult OR a property value-analysis call.","mindset":"Curious · conversational · zero pressure. Let him surface his own pain.","steps":[{"n":1,"label":"Pattern Interrupt","tags":["PI"],"script":"Hi, is this Tom? … Tom, this is Mark. Look, I'll be upfront — I'm a Realtor. Do you want to hang up, or would it be okay if I asked you something real quick?","note":"Pause — hand him control."},{"n":2,"label":"Reverse Presumptive","tags":["RP"],"script":"I was calling about the property on ABC Street. And if I asked whether you'd ever consider selling — it probably wouldn't matter what you could get in this market. You're gonna hang onto it forever, right?","note":"The takeaway disarms him; he'll often say \"well… maybe if the price was right.\""},{"n":3,"label":"Property Classification","tags":["ABC"],"script":"Makes sense. And I'm curious — is that a rental, a second home, or something else?","note":"Classify it. This sets up where the pain lives."},{"n":4,"label":"Surface the Pain","tags":["RP","EM"],"script":"A lot of owners tell me being a landlord is a headache — tenants, repairs — and they'd sell if it made sense. But I get the feeling you haven't had any issues like that, right?","note":"The takeaway invites him to vent the real frustration."},{"n":5,"label":"Discovery","tags":["EM","SQ"],"script":"What's been the biggest challenge with the property recently? … If you could walk away with the equity today — what would you do with it? … What would need to happen for selling to make sense for you? … How long have you been thinking about this — and what's holding you back?","note":"Pain · motivation · conditions · timeline / obstacle."},{"n":6,"label":"Future Offer","tags":["NO"],"script":"Not that I have a buyer right now — but if you decided to sell and got a great offer right away, would that cause any problems for you?","note":"Tests readiness without pressure."},{"n":7,"label":"Appointment Close","tags":["PM","HY","BC"],"script":"Before I let you go, can I make a quick recommendation? Let's pretend I did a full value analysis, the numbers made sense, and you genuinely believed selling now was a viable option — any reason you wouldn't want to explore that a bit more… Because — let's face it, Tom, you're not gonna do anything unless it makes sense, right?","note":"Permission → future-pace → Because → close the day. Offer the value-analysis call as the easy yes."}],"master":[{"n":1,"tags":[],"script":"Hi, is this [Name]?"},{"n":2,"tags":["PI"],"script":"[Name], this is Mark. Look I'll be upfront, I'm a Realtor, do you want to hang up, or would it be ok if I asked you something really quick?"},{"n":3,"tags":["RP"],"script":"I was calling about the property on ABC Street, and if I were to ask you if you'd ever consider selling, it probably wouldn't matter how much you could get in this market, you're probably going to hang on to it forever, right?"},{"n":4,"tags":["ABC"],"script":"Makes sense. And I'm curious, is that a rental property, a second home, or something else?"},{"n":5,"tags":["RP","EM"],"script":"I see. A lot of people I talk with who own rental properties tell me that being a landlord is frustrating, tenants are a headache to deal with and they would consider selling if it made sense, but I get the feeling you haven't had any issues with your tenants, would that be fair?"},{"n":6,"tags":["NO"],"script":"And, not that I have a buyer right now, but if you did decide to sell and got a great offer right away, would that cause any problems for you?"},{"n":7,"tags":["PM"],"script":"Ok, [Name], before I let you go, can I make a quick recommendation?"},{"n":8,"tags":["HY","BC"],"script":"Let's pretend I did a full value analysis on the property and you thought the numbers made sense and genuinely believed selling it right now was a viable option, would there be any reason why you wouldn't want to explore that a bit more… (Pause, then cut in) Because, I mean, let's face it, you're not going to do anything unless it makes sense, right?"},{"n":9,"tags":["YES"],"script":"Why don't we do this then — if you want, I'll do the full report to see how much the property could sell for, I'll go through the results with you on a quick call and then you can decide if talking about selling makes sense or not, does that sound fair?"},{"n":10,"tags":["PM"],"script":"Ok, I could probably jump back on a call tomorrow, what time would you like to talk?"},{"n":11,"tags":["NO"],"script":"That should work. In the meantime, would it be helpful if I emailed you a copy of my resume which would answer some of the questions you probably have about me, or would you just end up deleting it?"}],"routing":[{"situation":"Appt / value call","action":"Confirm details + day/time"},{"situation":"Pain, no urgency","action":"WARM — set follow-up"},{"situation":"\"Maybe someday\"","action":"SELLER NURTURE — equity updates"},{"situation":"Hard no / DNC","action":"Mark it, move on"}]},{"id":"frbo","name":"FRBO","goal":"Book the listing consult OR a property value-analysis call.","mindset":"Curious · conversational · zero pressure. The rental headache is your opening.","steps":[{"n":1,"label":"Pattern Interrupt","tags":["PI"],"script":"Hi, is this Tom? … Tom, this is Mark. I'm a Realtor, and before you hang up, I was hoping to ask a quick question about the home you've got for rent — would that be okay?","note":"You led with his rental, not a pitch. Pause."},{"n":2,"label":"Reverse Presumptive","tags":["RP"],"script":"I appreciate that. And if I asked whether you'd ever consider selling it — it probably wouldn't matter what you could get in this market. You're gonna hang onto it forever, right?","note":"The takeaway disarms him; he'll often soften."},{"n":3,"label":"Tenant Classification","tags":["ABC"],"script":"Makes sense. And I'm curious — is there a tenant in there now, or have they already moved out?","note":"Occupied vs. vacant changes the whole conversation."},{"n":4,"label":"Surface the Pain","tags":["RP","EM"],"script":"A lot of landlords tell me it's a headache — tenants, repairs, the managing — and they'd sell if it made sense. But I get the feeling you haven't had any issues like that, right?","note":"The takeaway invites him to vent the real frustration."},{"n":5,"label":"Discovery","tags":["EM","SQ"],"script":"What's the property been costing you versus what it brings in? … If you could pull the equity out today — what would you do with it? … What would need to happen for selling to make sense? … How long have you owned it — and what's kept you holding?","note":"Cash flow · motivation · conditions · timeline / obstacle."},{"n":6,"label":"Future Offer","tags":["NO"],"script":"Not that I have a buyer right now — but if you decided to sell and got a great offer right away, would that cause any problems for you?","note":"Tests readiness without pressure."},{"n":7,"label":"Appointment Close","tags":["PM","HY","BC"],"script":"Before I let you go, can I make a quick recommendation? Let's pretend I did a full value analysis, the numbers made sense, and you genuinely believed selling now was a viable option — any reason you wouldn't want to explore that a bit more… Because — let's face it, Tom, you're not gonna do anything unless it makes sense, right?","note":"Then: \"Why don't we do this — I'll run the full report, we'll go through it on a quick call, and you decide if selling makes sense. Sound fair?\" Close the time."}],"master":[{"n":1,"tags":[],"script":"Hi, is this [Name]?"},{"n":2,"tags":["PI"],"script":" opy of my resume which would answer some of the questions you probably have about me, or would you just end up deleting it?"}],"routing":[{"situation":"Appt / value call","action":"Confirm details + day/time"},{"situation":"Pain, no urgency","action":"WARM — set follow-up"},{"situation":"\"Happy landlord\"","action":"SELLER NURTURE — equity updates"},{"situation":"Hard no / DNC","action":"Mark it, move on"}]},{"id":"circle","name":"Circle","goal":"Book the consult. (Most start as Seller Nurture — every call is a long-term investment.)","mindset":"Curious · neighborly · zero pressure. Plant the seed; be the first call.","steps":[{"n":1,"label":"Pattern Interrupt","tags":["PI"],"script":"Hi, is this Tom? … Tom, this is Mark. Look, don't hate me — I'm a Realtor, and before you hang up, I was hoping to ask you something real quick. Would that be okay?","note":"Pause — hand him control."},{"n":2,"label":"Neighborhood Hook","tags":["PQ"],"script":"I appreciate that. Look, you're gonna think this is crazy — but there aren't many homes for sale and buyers are actively looking to move into your neighborhood. You haven't heard of anyone thinking about selling soon, have you?","note":"Opens two doors at once: a referral, or his own interest."},{"n":3,"label":"Reverse Presumptive","tags":["RP"],"script":"Got it. And if I asked whether you'd ever consider selling — it probably wouldn't matter what you could get; you'd laugh and say you're never moving, right?","note":"The takeaway invites the truth."},{"n":4,"label":"Discovery","tags":["SQ","NO"],"script":"How long have you lived in your home? … If you were ever to make a move — what are you looking for that you don't already have? … Not that I have a buyer right now — but if you got a great offer right away, you wouldn't be able to move anytime soon, right?","note":"Anchor · latent motivation · readiness test."},{"n":5,"label":"Referral Ask","tags":["PM"],"script":"And do me a favor — if you think of anyone in the neighborhood who might be considering a move, you'll keep me in mind, right?","note":"Circle = referral engine. Ask every time."},{"n":6,"label":"Appointment Close","tags":["PM","HY","BC"],"script":"Look, I'll be upfront — I don't know if I'm the right agent for you; you'll decide that. But let's pretend we met, and after you saw what your home's worth and what I'd do to get it sold, you believed I could help you get where you want to go next — any reason you wouldn't explore it a bit more… Because — let's face it, Tom, you're not gonna do anything unless it makes sense, right?","note":"Autonomy → future-pace → Because → close the day. For future movers: \"I know you're not moving until X, but let's pretend you walked away with a great plan in place for when you're ready…\""}],"master":[{"n":1,"tags":[],"script":"Hi, is this [Name]?"},{"n":2,"tags":["PI"],"script":"[Name], this is Mark, look don't hate me, I'm a Realtor and before you hang up, I was hoping to ask you something really quick, would that be ok?"},{"n":3,"tags":["PQ"],"script":"I appreciate that, look, you're going to think this is crazy but I'm calling because there aren't many homes for sale and buyers are looking to move into your neighborhood, you haven't heard of anyone thinking about selling soon, have you?"},{"n":4,"tags":["RP"],"script":"Got it, and if I were to ask you if you'd ever consider selling, it probably wouldn't matter how much you could get in this market, you'd probably laugh at me and say you're never moving, right?"},{"n":5,"tags":["SQ"],"script":"Makes sense and I'm curious, how long have you lived in your home?"},{"n":6,"tags":["SQ"],"script":"I see… and if you were to make a move, what are you looking for that you don't already have?"},{"n":7,"tags":["NO"],"script":"And not that I have a buyer right now, but if you did decide to sell and got a great offer right away, you wouldn't be able to move anytime soon, right?"},{"n":8,"tags":["PM"],"script":"Ok [Name], before I let you go, can I make a quick recommendation?"},{"n":9,"tags":["HY","BC"],"script":"I know you're not moving until X, but let's pretend you decided to have me over to look at the home now and after we had a chance to meet, you walked away with a great plan in place for when you are ready, is there any reason why you wouldn't invite me over to explore this a bit more… (Pause, then cut in) Because, I mean, let's face it, you're not going to do anything unless it makes sense, right?"},{"n":10,"tags":["PM"],"script":"Ok fine, then what day are you thinking would make sense for us to get together?"},{"n":11,"tags":["NO"],"script":"Ok I could probably make that work, and in the meantime, would it be helpful if I emailed you a copy of my resume which will answer most of the questions you probably have about me, or would you just end up deleting it?"}],"routing":[{"situation":"Motivation / event","action":"HOT — book appt now"},{"situation":"Curious, no urgency","action":"WARM — set follow-up"},{"situation":"Loves it, no plans","action":"SELLER NURTURE — drip"},{"situation":"Referral given","action":"Log it + call them today"}]},{"id":"probate","name":"Probate","goal":"Book a consult (often a slow yes). Build trust first — a relationship, not a transaction.","mindset":"Empathetic · patient · zero pressure. Lead with help, never the sale.","steps":[{"n":1,"label":"Pattern Interrupt (soft)","tags":["PI"],"script":"Hi, is this Tom? … Tom, this is Mark. Look, don't hate me — I'm a Realtor, and before you hang up, I was hoping you could help me out with something real quick. Would that be okay?","note":"\"Help me out\" is softer than \"ask you something.\" Slow down here."},{"n":2,"label":"The Reason + Takeaway","tags":["RP"],"script":"I appreciate that. The reason I called — I handle a lot of the properties that go through probate here in Bakersfield, and the one on ABC Street came across my desk with your name as the contact. But you don't have anything to do with that, do you?","note":"The takeaway lets him claim the role himself."},{"n":3,"label":"Empathy + Overwhelm","tags":["EM"],"script":"I see — I'm sorry for your loss. A lot of folks I work with tell me how overwhelmed they feel with the probate process and everything on their plate. I'm not sure if that's been your experience?","note":"Say the condolence and STOP. Let him talk. Do not rush."},{"n":4,"label":"Property Pain","tags":["RP","EM"],"script":"And when it comes to the property — most people tell me they don't even know where to start: cleaning it out, the estate sale, getting it ready to sell. But I get the feeling you haven't had to deal with any of that yet, right?","note":"Invites the real burden without you naming it."},{"n":5,"label":"'Too Early' Takeaway","tags":["RP"],"script":"And if I asked whether you've already hired a real estate pro who specializes in probate to help you through this — it's probably too early for that conversation, fair?","note":"Removes all pressure; positions you as the specialist."},{"n":6,"label":"Discovery (gentle)","tags":["EM","SQ"],"script":"Where are you in the probate process right now? … What's been the most overwhelming part so far? … When the time comes, what would you want to have happen with the property? … Is there anyone else helping you make these decisions?","note":"Stage · pain · outcome · decision-makers."},{"n":7,"label":"Appointment Close","tags":["PM","HY","BC"],"script":"Can I make a recommendation before I let you go? I know you're not ready to do anything yet — but let's pretend we met at the property, you showed me around, and after, you genuinely believed I could help you get through this and get it sold — any reason you wouldn't invite me over just to explore it… Because — you're not gonna do anything unless it makes sense, right?","note":"Recommend → future-pace → Because → close the day gently."}],"master":[{"n":1,"tags":[],"script":"Hi, is this [Name]?"},{"n":2,"tags":["PI"],"script":"[Name], this is Mark, look don't hate me, I'm a Realtor and before you hang up, I was hoping you could help me out with something really quick, would that be ok?"},{"n":3,"tags":["RP"],"script":"I appreciate that, well the reason I called is because I handle a lot of the properties that go through probate here in Bakersfield, and the property on ABC Street just came across my desk with your name as the contact, but you don't have anything to do with that, do you?"},{"n":4,"tags":["EM"],"script":"I see, I'm sorry for your loss… yeah and a lot of people I work with tell me how overwhelmed they are with the probate process with everything they have to do, I'm not sure if that's been your experience or not?"},{"n":5,"tags":["RP","EM"],"script":"Got it and when it comes to the property itself, most people tell me they don't even know where to start when it comes to getting the property cleaned out, handling the estate sale and getting the property ready to be sold, but I get the feeling you haven't come across any of that yet, right?"},{"n":6,"tags":["RP"],"script":"And if I were to ask if you've already hired a real estate professional who specializes in probate to help you through this process, it's probably too early to have that conversation, would that be fair?"},{"n":7,"tags":["PM"],"script":"Ok, well [Name], can I make a recommendation before I let you go?"},{"n":8,"tags":["HY","BC"],"script":"Well I know you're not ready to do anything yet, but let's pretend we met at the property so you could show me around and after we met, you genuinely believed I could help you get through this frustrating probate process and get the property sold for you, would there be any reason why you wouldn't invite me over just to explore this a bit more… (Pause, then cut in) Because, I mean, let's face it, you're not going to do anything unless it makes sense, right?"},{"n":9,"tags":["PM"],"script":"Ok, fine, then what day are you thinking would make sense for us to get together?"},{"n":10,"tags":["NO"],"script":"Ok, I could probably make that work, and in the meantime, would it be helpful if I emailed you a copy of my resume which will answer most of the questions you probably have about me, or would you just end up deleting it?"}],"routing":[{"situation":"Ready to meet","action":"Book appt — meet at the property"},{"situation":"Early in process","action":"SELLER NURTURE — helpful touches"},{"situation":"Refers to attorney / exec","action":"Get that contact + permission"},{"situation":"Hard no / DNC","action":"Mark it, move on"}]}],"closer":[{"id":"close","title":"A · The Close","subtitle":"Runs on every card. Autonomy → future-pace → Because → close the day.","lines":[{"script":"Look, I'll be upfront — I don't know if I'm the right agent for you; you'll decide that.","tag":"autonomy","codes":["PM"]},{"script":"But let's pretend we met, and after you saw my plan you genuinely believed I could sell your home and get you to [their outcome] — any reason you wouldn't invite me over just to explore it…","tag":"future-pace","codes":["HY","NO"]},{"script":"Because — let's face it, you're not gonna do anything unless it makes sense, right?","tag":"pause first, cut in the second they speak","codes":["BC"]},{"script":"What day makes sense for us to get together — would [day] or [alt] be better?","tag":"close the day","codes":["PM"]}]},{"id":"quality-lead","title":"B · If They Won't Book","subtitle":"Not a hard no = Quality Lead. Leave with a date, not a hope.","lines":[{"script":"Fair enough — can I ask a favor before you go, and you can be honest?","codes":["PM"]},{"script":"I'm not asking you to decide anything right now — but would you be against us revisiting this down the road, or is there no way you'd ever consider meeting?","tag":"no-oriented","codes":["NO"]},{"script":"Sounds fair — when would you like to hear from me again?","tag":"their answer is your follow-up date. Log it.","codes":["PM"]},{"script":"Would it help if I emailed you my resume — or would you just delete it?","codes":["NO"]},{"script":"Last thing — you're not gonna end this call and block my number, are you?","codes":["NO"]}]},{"id":"qualify","title":"C · The Second They Book","subtitle":"Qualify the appointment. Kill the no-show before it happens.","lines":[{"script":"Quick thing — the purpose of our meeting is just to figure out if working together makes sense. Fair?","codes":["YES"]},{"script":"If afterward you feel hiring me doesn't make sense, you'd be comfortable telling me, right? And if I feel I can't meet your expectations, would you be upset if I told you?","codes":["NO"]},{"script":"And if neither of us says no — okay if we spend a few minutes at the end on next steps?","codes":["PM"]},{"script":"Who else besides you will be part of this decision — and will they be there too?","tag":"decision-makers — confirm every one attends. Non-negotiable.","codes":["PM"]},{"script":"I almost forgot — you're not gonna hang up and think 'what did I do, I booked a Realtor' and cancel on me, are you?","codes":["NO"]},{"script":"Great — I'll see you [day/time], and I'll send a confirmation.","tag":"you confirm — 24 hrs prior, then prep"}]}],"arp":[{"letter":"A","name":"Acknowledge","detail":"\"Makes sense… fair enough.\" Agreeable acknowledgment — lower the defensiveness before anything else."},{"letter":"R","name":"Respond with permission","detail":"\"Can I ask you something before I let you go?\" Clarify and isolate: \"is that the only thing, or is there something else?\""},{"letter":"P","name":"Pivot","detail":"Pivot to a reverse-selling question, then land it: \"Because — you're not gonna do anything unless it makes sense, right?\""}],"objections":[{"id":"have-agent","name":"Already Have an Agent","sellerSays":"We already have an agent.","codes":["PM","ABC","BC"],"framework":["A — \"Makes sense — most people do.\"","R — \"Can I just ask you something about that before I let you go?\" (Soft check: \"the agent you're referring to isn't your sister-in-law, is it?\")","P — Are you already committed to relisting with them, or still deciding? Land the Because."],"response":"Makes sense — most people do. Can I ask, before I let you go: are you already committed to relisting with them, or still deciding? … Wouldn't it make sense to at least get a second opinion before you commit — because you're not gonna do anything unless it makes sense anyway, right?","advance":"Worth 15 minutes to compare strategies? (Note in FUB: is the agent a relative?)"},{"id":"not-selling","name":"Not Selling / Never Moving","sellerSays":"We're not selling. We're never moving.","codes":["ABC","RP"],"framework":["A — \"Makes sense, a lot of people feel that way.\"","R — \"Can I ask — is that because you've given up on moving, you don't think there's a buyer, or something else?\" (ABC)","P — Reverse presumptive: \"if I asked whether you'd ever sell, even for a great price, you'd probably laugh and say never, right?\""],"response":"Makes sense, a lot of people feel that way. Can I ask — is that because you've given up on moving, you don't think there's a buyer, or something else? … And if I asked whether you'd ever sell, even for a great price, you'd probably laugh and say never, right?","advance":"If truly no — run the Quality Lead script: get permission to follow up and a date."},{"id":"selling-ourselves","name":"Selling It Ourselves","sellerSays":"We're selling it ourselves.","codes":["EM","SQ","NO"],"framework":["A — \"That makes sense — a lot of owners start there.\"","R — \"What made you decide to try it on your own first?\"","P — \"If you could still net the number you want and skip the stress, would you be open to seeing your options?\""],"response":"That makes sense — a lot of owners start there. What made you decide to try it on your own first? … If you could still net the number you want and skip the stress, would you be open to seeing your options?","advance":"Would it hurt to get a second opinion on your strategy?"},{"id":"commission","name":"Commission Too High","sellerSays":"Your commission's too high. / How much do you charge?","codes":["PM","RP","NO"],"framework":["A — \"I hear you.\" / \"I'm really glad you brought that up…\"","R — \"Is the concern the commission itself, or your net number?\" (Biggest fear: \"if I told you I wasn't the cheapest agent, even if you believed I was the best, you'd never even consider meeting with me, right?\")","P — \"If a better strategy netted you more, would the fee still be the issue?\" Never defend the % — redirect to net."],"response":"I hear you. Most sellers care less about the fee and more about what they actually walk away with. Is the concern the commission itself, or your net number? … If a better strategy netted you more, would the fee still be the issue?","advance":"Worth comparing the numbers side by side?"},{"id":"waiting","name":"Waiting / Market Will Get Better","sellerSays":"We're going to wait. The market will get better.","codes":["ABC","SO"],"framework":["A — \"Totally understand.\" / \"Yeah, fair enough…\"","R — \"What specifically are you waiting for?\" (ABC: \"is that because you've given up on moving, you don't believe there's a buyer, or something else?\")","P — \"What would need to happen for you to feel ready?\""],"response":"Totally understand. What specifically are you waiting for? … And what would need to happen for you to feel ready?","advance":"Make sense to build the plan now so you're ready when the timing's right?"},{"id":"think-about-it","name":"Need to Think About It","sellerSays":"We need to think about it.","codes":["ABC","PM"],"framework":["A — \"Of course.\"","R — Isolate: \"What specifically do you need to think through — the timing, the price, the process, or choosing the right agent?\"","P — Offer the low-pressure next step and land the Because."],"response":"Of course. What specifically do you need to think through — is it the timing, the price, the process, or choosing the right agent?","advance":"Would it help to talk those through for 10 minutes — then you decide?"},{"id":"relist-same","name":"Relisting With Same Agent","sellerSays":"We're going to re-list with the same agent.","codes":["PM","SO","BC"],"framework":["A — \"Ok, fair, that's fair…\"","R — \"Can I ask you something about that before I let you go? I don't want to offend you — the agent you're referring to isn't your sister-in-law, is it?\"","P — \"Given that the agent failed to sell it the first time, would it not make sense to at least interview one other agent for a second opinion — because you're not gonna do anything unless it made sense anyway, right?\""],"response":"Ok, fair, that's fair… Can I ask you something about that before I let you go? I don't want to offend you — the agent you're referring to isn't your sister-in-law, is it? … Ok, well I have to ask: given that the agent failed to sell it the first time, would it not make sense to at least interview one other agent to get a second opinion — because, let's face it, you're not gonna do anything unless it made sense anyway, right?","advance":"Book the second-opinion meeting before they re-sign."},{"id":"have-buyer","name":"\"Do You Have a Buyer?\"","sellerSays":"Do you have a buyer?","codes":["PM","RP"],"framework":["A — \"That's a good question, I'm glad you brought that up…\"","R — \"I'm sure there's a ton of agents misleading you saying they have a buyer when they don't — which I won't do. Can I share my biggest fear before I let you go?\"","P — Reverse presumptive: \"if I told you I don't have a specific buyer right now, it wouldn't matter what I said next — you probably wouldn't even hear me out, would that be fair?\""],"response":"That's a good question, I'm glad you brought that up… And I'm sure there's a ton of agents out there misleading you saying they have a buyer when they don't, which I won't do. So can I share my biggest fear before I let you go? … I get the feeling that if I told you I don't have a specific buyer right now, it wouldn't matter what I said next — you probably wouldn't even hear me out. Would that be fair?","advance":"Honesty becomes the differentiator — pivot to the plan that creates buyers, then close the meeting."},{"id":"do-differently","name":"\"What Will You Do Differently?\"","sellerSays":"What are you going to do differently to sell my house?","codes":["PM","RP"],"framework":["A — \"I'm really glad you brought that up…\"","R — \"I'm going to tell you — but can I share my biggest fear?\"","P — \"If I took the next few minutes telling you everything I do differently — A, you probably wouldn't believe me, and B, you probably wouldn't meet with me anyways. Would that be fair?\""],"response":"I'm really glad you brought that up… And I'm going to tell you, but can I share my biggest fear? … I get the feeling that if I were to take the next few minutes and tell you all the things I do differently — A, you probably wouldn't believe me, and B, you probably wouldn't meet with me anyways. Would that be fair?","advance":"The plan is shown, not told — that's the reason the meeting exists. Close the day."}],"stages":["HOT","WARM","NURTURE"],"stageMeta":{"HOT":{"label":"Hot","desc":"Selling soon. Motivated. Timeline near.","cadence":"Touch every 2-3 days"},"WARM":{"label":"Warm","desc":"Considering. Uncertain timing.","cadence":"Touch weekly"},"NURTURE":{"label":"Seller Nurture","desc":"Future sellers. Relationship play.","cadence":"Touch monthly"}}};
