async function warPlan(id){
  const l=S.leads.find(x=>x.id===id);if(!l)return;
  if(!getKey()){alert('The War Plan runs on the Coach — connect your API key on the Coach page first.');return;}
  if(l.plan&&!confirm('A War Plan already exists for '+l.name+'. Regenerate?'))return;
  const card=$1('[data-id="'+id+'"]',root);
  if(card){const b=$1('button[data-warplan]',card);if(b){b.textContent='Building…';b.disabled=true;}}
  const prompt=
    'Build a pre-appointment WAR PLAN for this listing appointment. Be specific and verbatim where scripts are needed.\n\n'+
    'LEAD: '+l.name+' · source: '+(l.source||'unknown')+' · stage: '+l.stage+' · appt: '+(l.appt||'unset')+'\n'+
    'NOTES FROM CALLS: '+(l.notes||'none recorded')+'\n'+
    'TOUCHES: '+((l.touches||[]).length)+' since '+(l.created||'?')+'\n\n'+
    'Respond in EXACTLY this format, plain text, no markdown headers:\n'+
    'SELLER READ: (2-3 sentences of psychology based on source + notes)\n'+
    'TOP 3 OBJECTIONS: (numbered; pick from: '+DATA.objections.map(o=>o.name).join(', ')+' — for each give the one-line A→C→I→R→A handle)\n'+
    'DISCOVERY GAPS: (2-3 questions not yet asked, word-for-word, referencing the question types)\n'+
    'PRICING CONVERSATION: (3-4 sentences on how to run it for this situation)\n'+
    'FIRST 60 SECONDS: (the exact opener to use at the door/call)';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'content-type':'application/json','x-api-key':getKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:900,
        system:'You are a top-producing listing agent coach fluent in reverse selling (pattern interrupts, permission, no-oriented questions, future pacing, Because closes, A-C-I-R-A objection handling). Coach Mark Allen, Bakersfield CA. Be tactical and verbatim.',
        messages:[{role:'user',content:prompt}]}),
    });
    const data=await res.json();
    if(data.content&&data.content[0]){
      l.plan=data.content.map(c=>c.text||'').join('').trim();
      save();
    }else alert('Coach error: '+(data.error&&data.error.message||'no response'));
  }catch(e){alert('Connection error: '+e.message);}
  renderStages();
}
function debrief(id){
  const l=S.leads.find(x=>x.id===id);if(!l)return;
  const result=prompt('Result — type one: taken / lost / followup',l.result||'taken');
  if(!result)return;
  l.result=result.trim().toLowerCase();
  const objs=prompt('Which objections surfaced? (comma-separated, blank if none)\n'+DATA.objections.map(o=>o.name).join(' · '),'');
  l.objectionsSurfaced=(objs||'').split(',').map(s2=>s2.trim()).filter(Boolean);
  const note=prompt('One line — what stalled or what won it?','');
  if(note)l.notes=((l.notes||'')+' | DEBRIEF: '+note).trim();
  /* losses feed tomorrow's Gauntlet: matching objection items come due now */
  if(l.result!=='taken'&&l.objectionsSurfaced.length){
    DATA.objections.forEach(o=>{
      if(l.objectionsSurfaced.some(x=>o.name.toLowerCase().includes(x.toLowerCase())||x.toLowerCase().includes(o.name.toLowerCase().slice(0,8)))){
        const st=S.gauntlet.items['obj:'+o.id]||{ease:2.5,interval:0,due:dayKey(),hist:[]};
        st.due=dayKey();st.interval=0;
        S.gauntlet.items['obj:'+o.id]=st;
      }
    });
  }
  if(l.result==='taken'){
    const today2=dayKey();
    S.outcomes[today2]=S.outcomes[today2]||{};
    const src=l.source||'other';
    S.outcomes[today2][src]=S.outcomes[today2][src]||{};
    S.outcomes[today2][src].listings=(S.outcomes[today2][src].listings||0)+1;
  }
  save();renderStages();
}

async function gradeCall(){
  const txt=$1('#fr-txt').value.trim();
  if(txt.length<200){alert('Paste the full transcript — need at least a few exchanges to grade.');return;}
  $1('#fr-status').textContent='Coach is reviewing the tape…';

    'Stages: '+FILM_STAGES.map(s2=>s2.name).join(', ')+'.\n\n'+
    'Return ONLY valid JSON, no other text: {"stages":[{"name":"<stage>","score":<1-10 or null if stage never attempted>,"note":"<one specific line of feedback with a verbatim fix>"}],"summary":"<2-3 sentence overall read>","mostExpensiveMistake":"<the single costliest moment, quoted, with the exact line that should have been said>"}\n\nTRANSCRIPT:\n'+txt.slice(0,12000);
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'content-type':'application/json','x-api-key':getKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1400,
        system:'You are an elite real-estate prospecting call grader fluent in reverse selling. Grade hard — a 7 means genuinely good. Quote the transcript in feedback. Return only the JSON requested.',
        messages:[{role:'user',content:prompt}]}),
    });
    const data=await res.json();
    const raw=(data.content&&data.content.map(c=>c.text||'').join(''))||'';
    const m=raw.match(/\{[\s\S]*\}/);
    if(!m)throw new Error(data.error&&data.error.message||'no parseable grade returned');
    const verdict=JSON.parse(m[0]);

    S.genome.calls.push({d:dayKey(),stages:verdict.stages,summary:verdict.summary});

      if(st.score==null)return;
      const def=FILM_STAGES.find(f=>f.name===st.name)||{codes:[]};
      const g=S.genome.stages[st.name]||{sum:0,n:0,codes:def.codes};
      g.sum+=st.score;g.n++;g.avg=g.sum/g.n;g.codes=def.codes;
      S.genome.stages[st.name]=g;
    });
    save();

        '<p class="m-0 text-[11.5px] leading-snug" style="color: var(--muted);">'+esc(st.note||'')+'</p></div>').join('')+'</div>'+
      '<div class="eyebrow mb-1">The read</div><p class="m-0 text-[12.5px] leading-relaxed mb-3" style="color: var(--muted);">'+esc(verdict.summary||'')+'</p>'+

    $1('#fr-status').textContent='Graded and saved.';
  }catch(e){

  else if(cls==='ai'){d.className='card p-3 text-[13.5px]';d.style.cssText='margin-right:14%;white-space:pre-wrap;';}
  else{d.className='text-[11px] mono';d.style.cssText='color:var(--muted-2);text-align:center;';}
  d.textContent=txt;log.appendChild(d);d.scrollIntoView({block:'end'});
  return d;
}
async function sendCoach(text,silent){
  if(!silent)ccLine('me',text);
  coachMsgs.push({role:'user',content:text});
  const th=ccLine('sys','Coach is thinking…');
  try{
    const objlist=DATA.objections.map(o=>o.name+' ("'+o.sellerSays+'")').join('; ');
    const t=today(),g=targets();
    const sys=(COACH_SYS[coachMode]||COACH_SYS['Build / Refine Script']).replace('OBJLIST',objlist)+
      '\n\nLIVE CONTEXT — today: '+t.contacts+'/'+g.contacts+' contacts, '+t.conversations+'/'+g.conversations+' conversations, '+t.leads+' leads, '+t.appointments+'/'+g.appointments+' appointments; streak '+streak()+' days; pipeline '+S.leads.filter(l=>l.stage==='HOT').length+' hot / '+S.leads.filter(l=>l.stage==='WARM').length+' warm / '+S.leads.filter(l=>l.stage==='NURTURE').length+' nurture.\nKeep replies under 150 words unless building a full script.';
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'content-type':'application/json','x-api-key':getKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:700,system:sys,messages:coachMsgs.slice(-20)}),
    });
    const data=await res.json();
    th.remove();
    if(data.content&&data.content[0]){
      const reply=data.content.map(c=>c.text||'').join('');
      coachMsgs.push({role:'assistant',content:reply});
      ccLine('ai',reply);
    }else ccLine('sys','Error: '+(data.error&&data.error.message||'no response'));
  }catch(e){th.remove();ccLine('sys','Connection error: '+e.message);}
}

/* ================= ANALYTICS ================= */
function monthTotals(){
  const mk=dayKey().slice(0,7),t=blank();
  for(const k in S.days){if(k.slice(0,7)!==mk)continue;for(const f in t)t[f]+=S.days[k][f]||0;}
  return t;
}
function hydrateAnalytics(){
  // 14-day bars
  const bars=$$('.flex.items-end.gap-1\\.5 > div',root);
  const d=new Date();d.setDate(d.getDate()-13);
  let max=1;const vals=[];
  for(let i=0;i<14;i++){
    const k=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    const v=(S.days[k]||{}).contacts||0;
    vals.push([k,v]);max=Math.max(max,v);
    d.setDate(d.getDate()+1);
  }
  bars.forEach((b,i)=>{
    if(!vals[i])return;
    const [k,v]=vals[i];
    b.title=k+': '+v;
    const fill=$1('div',b);
    if(fill){
      fill.style.height=Math.max(3,v/max*100)+'%';
      fill.style.background=v>0?'var(--accent)':'rgba(148, 163, 184, 0.25)';
      fill.style.boxShadow=v>0?'0 0 10px rgba(96,165,250,.4)':'none';
    }
  });
  const lbls=$$('.flex.justify-between.mono span',root);
  if(lbls[0])lbls[0].textContent=vals[0][0].slice(5);
  // conversion trio
  const m=monthTotals();
  const trio=$$('.card.p-4.text-center .mono.text-\\[24px\\]',root);
  const r=[m.contacts?Math.round(m.conversations/m.contacts*100):0,
           m.conversations?Math.round(m.leads/m.conversations*100):0,
           m.leads?Math.round(m.appointments/m.leads*100):0];
  trio.forEach((el,i)=>{if(r[i]!=null)el.textContent=r[i]+'%';});
  // bottom cards
  const cards=$$('.card.p-4:not(.text-center)',root);
  const pipeCard=cards.find(c=>c.textContent.includes('Pipeline GCI'));
  if(pipeCard){
    const sum=S.leads.reduce((a,l)=>a+(l.value||S.settings.avgCheck),0);
    $1('.mono.text-\\[24px\\]',pipeCard).textContent=money(sum);
    $1('.text-\\[10\\.5px\\]',pipeCard).textContent=S.leads.length+' open opportunit'+(S.leads.length===1?'y':'ies');
  }
  const actCard=cards.find(c=>c.textContent.includes('Activity-Earned'));
  if(actCard){
    $1('.mono.text-\\[24px\\]',actCard).textContent=money(S.lifetimeContacts*perContact());
    $1('.text-\\[10\\.5px\\]',actCard).textContent=S.lifetimeContacts+' lifetime contacts × '+money(perContact());
  }
  renderSourceIntel();
  renderObjectionIntel();
  renderVaultCard();
}
/* ---------- Standards & Data Vault card (Analytics) ---------- */

  const old=$1('#vault-card',root);if(old)old.remove();
  const wrap=$1('.fade-up',root);if(!wrap)return;
  const g=targets();
  const card=document.createElement('div');
  card.id='vault-card';
  card.className='card p-5 mt-4';
  card.innerHTML='<div class="eyebrow mb-3">The Standard &amp; The Vault</div>'+
    '<div class="flex items-end gap-3 flex-wrap mb-4">'+
    [['contacts','Contacts/day'],['conversations','Convos/day'],['leads','Leads/day'],['appointments','Appts/day']].map(([k,lbl])=>
      '<div><div class="eyebrow mb-1" style="font-size: 8.5px;">'+lbl+'</div>'+
      '<input type="number" class="input mono" data-std="'+k+'" value="'+g[k]+'" min="1" style="width: 76px; font-size: 14px; text-align: center;"></div>').join('')+
    '<div><div class="eyebrow mb-1" style="font-size: 8.5px;">Avg check ($)</div>'+
    '<input type="number" class="input mono" data-std="avgCheck" value="'+S.settings.avgCheck+'" min="0" style="width: 96px; font-size: 14px; text-align: center;"></div></div>'+
    '<div class="flex gap-2 flex-wrap items-center">'+
    '<button class="btn" id="vault-export" style="padding: 7px 14px; font-size: 12px;">Export backup</button>'+
    '<button class="btn" id="vault-import" style="padding: 7px 14px; font-size: 12px; color: var(--muted);">Import backup</button>'+
    '<input type="file" id="vault-file" accept=".json" style="display: none;">'+
    '<span class="mono text-[10px]" style="color: var(--muted-2);">Rolling snapshots kept for 7 days on this device. Export weekly — the file is the business record.</span></div>';
  wrap.appendChild(card);
  $$('input[data-std]',card).forEach(inp=>inp.addEventListener('change',()=>{
    const v=Math.max(+inp.min||0,parseFloat(inp.value)||0);
    if(inp.dataset.std==='avgCheck')S.settings.avgCheck=v;
    else S.settings.targets[inp.dataset.std]=v;
    save();
  }));
  $1('#vault-export',card).addEventListener('click',exportState);
  $1('#vault-import',card).addEventListener('click',()=>$1('#vault-file',card).click());
  $1('#vault-file',card).addEventListener('change',e=>{if(e.target.files[0])importState(e.target.files[0]);});
}
/* ---------- objection frequency (Wingman telemetry) ---------- */
function objectionTotals(){
  const tot={};
  for(const d in S.objectionHits)for(const src in S.objectionHits[d])for(const id in S.objectionHits[d][src])
    tot[id]=(tot[id]||0)+S.objectionHits[d][src][id];
  return tot;
}
function renderObjectionIntel(){
  const old=$1('#obj-intel',root);if(old)old.remove();
  const tot=objectionTotals();
  const rows=Object.entries(tot).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const wrap=$1('.fade-up',root);if(!wrap)return;
  const total=Object.values(tot).reduce((a,b)=>a+b,0);

  card.id='obj-intel';
  card.className='card p-5 mt-4';
  card.innerHTML='<div class="eyebrow mb-3">What They Throw At You — '+total+' logged</div>'+
    '<div class="flex flex-col gap-1.5">'+rows.map(([id,n])=>{

    }).join('')+'</div><p class="m-0 mt-2.5 text-[10px] mono" style="color: var(--muted-2);">High-frequency objections drill first in the Gauntlet.</p>';

      '<div class="flex flex-col gap-1.5">'+

        '<span class="text-[12.5px] font-medium" style="flex: 1;">'+esc(r.name)+(i===0&&r.v.appointments>0?' <span class="mono text-[9px]" style="color: var(--good, #22C55E);">BEST</span>':'')+'</span>'+
        '<span class="mono text-[12px]" style="width: 46px; text-align: right;">'+(r.v.dials||0)+'</span>'+

/* ================= LEAD SOURCES (chips + Flow Card / Master Script) ================= */
let srcId='expired',srcMode='flow';
function codeChip(t){
  const m=DATA.codes[t]||{name:t,short:''};
  return '<span class="mono" title="'+esc(m.name)+' — '+esc(m.short)+'" style="color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;">'+esc(t)+'</span>';
}
function hydrateSources(){
  const bar=$1('.flex.gap-1\\.5.flex-wrap',root);
  if(!bar)return;
  const paint=()=>{
    $$('button',bar).forEach(b=>{
      const t=b.textContent.trim();
      const on=(DATA.scripts.some(s=>s.name===t)&&DATA.scripts.find(s=>s.id===srcId).name===t)||
               (t==='Flow Card'&&srcMode==='flow')||(t==='Master Script'&&srcMode==='master');
      b.style.borderColor=on?'var(--accent)':'';
      b.style.color=on?'var(--accent)':'var(--muted)';
    });
  };
  $$('button',bar).forEach(b=>b.addEventListener('click',()=>{
    const t=b.textContent.trim();
    const sc=DATA.scripts.find(s=>s.name===t);
    if(sc)srcId=sc.id;
    else if(t==='Flow Card')srcMode='flow';
    else if(t==='Master Script')srcMode='master';
    paint();renderSource();
  }));
  paint();renderSource();
}
function renderSource(){
  const sc=DATA.scripts.find(s=>s.id===srcId)||DATA.scripts[0];
  const wrap=$1('.fade-up',root);
  // goal / mindset
  const gm=$$('.grid.gap-3.mb-4 .card.p-4',wrap);
  if(gm[0])$1('p',gm[0]).textContent=sc.goal;
  if(gm[1])$1('p',gm[1]).textContent=sc.mindset;
  // body region: everything between goal/mindset grid and routing card is rebuilt
  let body=$1('#src-body',wrap);
  if(!body){
    // replace original step list + routing with a managed container
    const grid=$1('.grid.gap-3.mb-4',wrap);
    let n=grid.nextElementSibling;
    while(n){const nx=n.nextElementSibling;n.remove();n=nx;}
    body=document.createElement('div');
    body.id='src-body';
    wrap.appendChild(body);
  }
  let html='';
  if(srcMode==='flow'){
    html+='<div class="flex flex-col gap-2.5 mb-4">'+sc.steps.map(st=>
      '<div class="card p-4"><div class="flex items-center gap-2 flex-wrap mb-1.5">'+
      '<span class="mono text-[13px] font-semibold" style="color: var(--accent);">'+st.n+'</span>'+
      '<span class="text-[13px] font-semibold">'+esc(st.label)+'</span>'+(st.tags||[]).map(codeChip).join('')+'</div>'+
      '<p class="m-0 text-[13.5px] leading-relaxed mb-1.5">'+esc(st.script)+'</p>'+
      (st.note?'<p class="m-0 text-[11.5px] leading-snug" style="color: var(--muted-2); font-style: italic;">'+esc(st.note)+'</p>':'')+
      '</div>').join('')+'</div>';
  }else{
    html+='<div class="card p-5 mb-4"><div class="eyebrow mb-3">Master Script — verbatim</div><div class="flex flex-col gap-2.5">'+
      sc.master.map(e=>'<div class="flex items-start gap-3">'+
      '<span class="mono text-[12px] shrink-0 pt-0.5" style="color: var(--muted-2); width: 20px; text-align: right;">'+e.n+'</span>'+
      '<div class="min-w-0"><p class="m-0 text-[13.5px] leading-relaxed">'+esc(e.script)+'</p>'+
      ((e.tags&&e.tags.length)?'<div class="flex gap-1 mt-1">'+e.tags.map(codeChip).join('')+'</div>':'')+
      '</div></div>').join('')+'</div></div>';
  }
  html+='<div class="card p-5"><div class="eyebrow mb-1">Routing — no call ends without a next step</div><div class="mt-3 flex flex-col gap-1.5">'+
    (sc.routing||[]).map(r=>'<div class="flex items-start gap-3 rounded-lg px-3 py-2" style="background: var(--surface-2); border: 1px solid var(--border);">'+
    '<span class="text-[12.5px] font-medium" style="min-width: 110px;">'+esc(r.situation)+'</span>'+
    '<span class="text-[12px]" style="color: var(--muted);">'+esc(r.action)+'</span></div>').join('')+'</div></div>';
  body.innerHTML=html;
}
