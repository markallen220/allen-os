\"nav-dot\"></span>Command Center</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Battle Mode</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Pipeline</div></div><div class=\"mb-3\"><div class=\"eyebrow px-2.5 mb-1.5\" style=\"font-size: 9px;\">Train</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Coach</div><div class=\"nav-item active\"><span class=\"nav-dot\"></span>Train</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Objections</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Lead Sources</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>The Closer</div></div><div class=\"mb-3\"><div class=\"eyebrow px-2.5 mb-1.5\" style=\"font-size: 9px;\">Measure</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>War Room</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Analytics</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Business Plan</div></div></div><div class=\"px-4 py-4\" style=\"border-top: 1px solid var(--border);\"><div class=\"text-[10.5px]\" style=\"color: var(--muted-2);\">REALTOR® · Bakersfield, CA</div><div class=\"mono text-[10.5px] mt-0.5\" style=\"color: var(--muted-2);\">DRE# 01933129</div></div></div><div class=\"flex-1 min-w-0\"><div class=\"md:hidden flex items-center justify-between px-4 py-3 sticky top-0 z-30\" style=\"background: rgba(11, 13, 17, 0.92); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); padding-top: calc(12px + env(safe-area-inset-top));\"><span class=\"mono text-[14px] font-semibold\" style=\"letter-spacing: 0.3em;\">ALLEN <span style=\"color: var(--accent);\">OS</span></span><span class=\"text-[9.5px] eyebrow\">Sales. Systems. Execution.</span></div><div class=\"px-4 md:px-8 py-6\" style=\"max-width: 1080px; margin: 0px auto; padding-bottom: 110px;\"><div class=\"fade-up\"><div class=\"mb-5\"><div class=\"eyebrow mb-1.5\">Train</div><h1 class=\"text-[26px] font-semibold tracking-tight m-0\" style=\"letter-spacing: -0.02em;\">The Framework</h1><p class=\"m-0 mt-1 text-[13px]\" style=\"color: var(--muted);\">Reverse Selling, end to end. Foundations first, then the 12 question types.</p></div><div class=\"flex gap-1.5 mb-5\"><button class=\"btn\" style=\"border-color: var(--accent); color: var(--accent);\">Foundations</button><button class=\"btn\" style=\"color: var(--muted);\">Question Types</button></div><div class=\"grid gap-2.5 mb-5\" style=\"grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));\"><div class=\"card p-4\"><div class=\"text-[13px] font-semibold mb-1\" style=\"color: var(--accent);\">People don't like being sold</div><p class=\"m-0 text-[12px] leading-snug\" style=\"color: var(--muted);\">They like discovering their own reasons for deciding. Your job is to surface those reasons, not supply them.</p></div><div class=\"card p-4\"><div class=\"text-[13px] font-semibold mb-1\" style=\"color: var(--accent);\">Curiosity over persuasion</div><p class=\"m-0 text-[12px] leading-snug\" style=\"color: var(--muted);\">You're a diagnostic questioning expert, not a persuader. Ask. Let them arrive at the conclusion.</p></div><div class=\"card p-4\"><div class=\"text-[13px] font-semibold mb-1\" style=\"color: var(--accent);\">Qualification over convincing</div><p class=\"m-0 text-[12px] leading-snug\" style=\"color: var(--muted);\">You're deciding whether THEY are a fit — not the other way around. That posture is what creates the trust.</p></div><div class=\"card p-4\"><div class=\"text-[13px] font-semibold mb-1\" style=\"color: var(--accent);\">The seller talks 70%</div><p class=\"m-0 text-[12px] leading-snug\" style=\"color: var(--muted);\">Less talking, more questions. Silence after a question is a tool — let it sit, they fill it.</p></div><div class=\"card p-4\"><div class=\"text-[13px] font-semibold mb-1\" style=\"color: var(--accent);\">Give control away</div><p class=\"m-0 text-[12px] leading-snug\" style=\"color: var(--muted);\">Hand them the exit, the permission, the 'no'. Control given is trust earned. Neediness kills the call.</p></div><div class=\"card p-4\"><div class=\"text-[13px] font-semibold mb-1\" style=\"color: var(--accent);\">Emotion drives the decision</div><p class=\"m-0 text-[12px] leading-snug\" style=\"color: var(--muted);\">Logic justifies it later. Dig for motivation, pain, timeline, and the desired outcome before you recommend anything.</p></div><div class=\"card p-4\"><div class=\"text-[13px] font-semibold mb-1\" style=\"color: var(--accent);\">Never push, pressure, argue, or convince</div><p class=\"m-0 text-[12px] leading-snug\" style=\"color: var(--muted);\">Every objection ends in forward movement, never a debate. Resolve, then advance.</p></div><div class=\"card p-4\"><div class=\"text-[13px] font-semibold mb-1\" style=\"color: var(--accent);\">The goal isn't dials</div><p class=\"m-0 text-[12px] leading-snug\" style=\"color: var(--muted);\">It's appointments held → listings taken → closings. Everything points one direction.</p></div></div><div class=\"card p-5 mb-4\"><div class=\"eyebrow mb-3\">The Conversion Sequence — never skip a stage</div><div class=\"flex flex-col gap-2\"><div class=\"flex items-start gap-3 rounded-lg px-3 py-2.5\" style=\"background: var(--surface-2); border: 1px solid var(--border);\"><span class=\"mono text-[14px] font-semibold shrink-0\" style=\"color: var(--accent); width: 18px;\">1</span><div class=\"min-w-0\"><div class=\"flex items-center gap-2 flex-wrap mb-0.5\"><span class=\"text-[13px] font-semibold\">Pattern Interrupt</span><span class=\"mono\" title=\"Pattern Interrupt — Lower resistance. Give control away.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">PI</span></div><p class=\"m-0 text-[12px] leading-snug\" style=\"color: var(--muted);\">Break the script in their head. Honesty + the exit keeps them on the line.</p></div></div><div class=\"flex items-start gap-3 rounded-lg px-3 py-2.5\" style=\"background: var(--surface-2); border: 1px solid var(--border);\"><span class=\"mono text-[14px] font-semibold shrink-0\" style=\"color: var(--accent); width: 18px;\">2</span><div class=\"min-w-0\"><div class=\"flex items-center gap-2 flex-wrap mb-0.5\"><span class=\"text-[13px] font-semibold\">Reverse Presumptive</span><span class=\"mono\" title=\"Reverse Presumptive — The takeaway. Presume the no.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">RP</span></div><p class=\"m-0 text-[12px] leading-snug\" style=\"color: var(--muted);\">The takeaway. Presume the no — they correct you and open up on their own.</p></div></div><div class=\"flex items-start gap-3 rounded-lg px-3 py-2.5\" style=\"background: var(--surface-2); border: 1px solid var(--border);\"><span class=\"mono text-[14px] font-semibold shrink-0\" style=\"color: var(--accent); width: 18px;\">3</span><div class=\"min-w-0\"><div class=\"flex items-center gap-2 flex-wrap mb-0.5\"><span class=\"text-[13px] font-semibold\">Discovery</span><span class=\"mono\" title=\"ABC — Multiple choice. Surface the real reason.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">ABC</span><span class=\"mono\" title=\"Presumptive — Assume it forward; ask the detail.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">PQ</span><span class=\"mono\" title=\"Status Quo — Challenge inaction. Can they just stay?\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">SQ</span></div><p class=\"m-0 text-[12px] leading-snug\" style=\"color: var(--muted);\">Diagnose: motivation, timeline, obstacles. ABC and presumptive questions make answering easy.</p></div></div><div class=\"flex items-start gap-3 rounded-lg px-3 py-2.5\" style=\"background: var(--surface-2); border: 1px solid var(--border);\"><span class=\"mono text-[14px] font-semibold shrink-0\" style=\"color: var(--accent); width: 18px;\">4</span><div class=\"min-w-0\"><div class=\"flex items-center gap-2 flex-wrap mb-0.5\"><span class=\"text-[13px] font-semibold\">Emotional Discovery</span><span class=\"mono\" title=\"Emotional — Find the pain. Emotion drives the decision.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">EM</span></div><p class=\"m-0 text-[12px] leading-snug\" style=\"color: var(--muted);\">Find the pain. Repeat their emotional words back. This is the motivation signal.</p></div></div><div class=\"flex items-start gap-3 rounded-lg px-3 py-2.5\" style=\"background: var(--surface-2); border: 1px solid var(--border);\"><span class=\"mono text-[14px] font-semibold shrink-0\" style=\"color: var(--accent); width: 18px;\">5</span><div class=\"min-w-0\"><div class=\"flex items-center gap-2 flex-wrap mb-0.5\"><span class=\"text-[13px] font-semibold\">Status Quo Challenge</span><span class=\"mono\" title=\"Status Quo — Challenge inaction. Can they just stay?\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">SQ</span><span class=\"mono\" title=\"Socratic — Let the market argue for you.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">SO</span></div><p class=\"m-0 text-[12px] leading-snug\" style=\"color: var(--muted);\">Could they just stay? Let the market and their own logic challenge the inaction.</p></div></div><div class=\"flex items-start gap-3 rounded-lg px-3 py-2.5\" style=\"background: var(--surface-2); border: 1px solid var(--border);\"><span class=\"mono text-[14px] font-semibold shrink-0\" style=\"color: var(--accent); width: 18px;\">6</span><div class=\"min-w-0\"><div class=\"flex items-center gap-2 flex-wrap mb-0.5\"><span class=\"text-[13px] font-semibold\">Future Pace</span><span class=\"mono\" title=\"Hypothetical / Future Pace — Let them live the outcome first.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">HY</span></div><p class=\"m-0 text-[12px] leading-snug\" style=\"color: var(--muted);\">Let them live the solved outcome. The appointment becomes the obvious next step.</p></div></div><div class=\"flex items-start gap-3 rounded-lg px-3 py-2.5\" style=\"background: var(--surface-2); border: 1px solid var(--border);\"><span class=\"mono text-[14px] font-semibold shrink-0\" style=\"color: var(--accent); width: 18px;\">7</span><div class=\"min-w-0\"><div class=\"flex items-center gap-2 flex-wrap mb-0.5\"><span class=\"text-[13px] font-semibold\">Commitment Bridge</span><span class=\"mono\" title=\"No-Oriented — Frame so 'no' means yes.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">NO</span><span class=\"mono\" title=\"Because — The landing gear. Cut in on the pause.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">BC</span></div><p class=\"m-0 text-[12px] leading-snug\" style=\"color: var(--muted);\">No-oriented ask + the Because. Pause, then cut in the second they speak.</p></div></div><div class=\"flex items-start gap-3 rounded-lg px-3 py-2.5\" style=\"background: var(--surface-2); border: 1px solid var(--border);\"><span class=\"mono text-[14px] font-semibold shrink-0\" style=\"color: var(--accent); width: 18px;\">8</span><div class=\"min-w-0\"><div class=\"flex items-center gap-2 flex-wrap mb-0.5\"><span class=\"text-[13px] font-semibold\">Day Close</span><span class=\"mono\" title=\"Permission — Control given is trust earned.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">PM</span><span class=\"mono\" title=\"Yes-Oriented — Micro-agreement. Keep momentum.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">YES</span></div><p class=\"m-0 text-[12px] leading-snug\" style=\"color: var(--muted);\">Move to logistics, not persuasion. Lock the day, qualify the appointment, confirm.</p></div></div></div></div><div class=\"text-center mono text-[11px]\" style=\"color: var(--muted-2); letter-spacing: 0.08em;\">Pattern Interrupt → Discovery → Motivation → Future Pace → Appointment — only the opening changes by source.</div></div></div></div><div class=\"bottom-nav md:hidden\"><button class=\"bottom-nav-item\"><span class=\"bn-dot\"></span>Command</button><button class=\"bottom-nav-item\"><span class=\"bn-dot\"></span>Battle</button><button class=\"bottom-nav-item\"><span class=\"bn-dot\"></span>Pipeline</button><button class=\"bottom-nav-item\"><span class=\"bn-dot\"></span>Coach</button><button class=\"bottom-nav-item active\"><span class=\"bn-dot\"></span>More</button></div></div>","objections":"<div class=\"flex min-h-screen\"><div class=\"hidden md:flex flex-col items-center justify-center shrink-0\" style=\"width: 58px; border-right: 1px solid var(--border); background: rgb(11, 13, 17); position: sticky; top: 0px; height: 100vh;\"><div class=\"mono\" style=\"writing-mode: vertical-rl; transform: rotate(180deg); font-size: 21px; letter-spacing: 0.46em; font-weight: 600; color: var(--text); user-select: none;\">ALLEN <span style=\"color: var(--accent);\">OS</span></div></div><div class=\"hidden md:flex flex-col shrink-0\" style=\"width: 200px; border-right: 1px solid var(--border); background: rgb(11, 13, 17); position: sticky; top: 0px; height: 100vh;\"><div class=\"px-4 pt-5 pb-3\"><div class=\"eyebrow\">Sales. Systems. Execution.</div></div><div class=\"flex-1 overflow-y-auto px-2.5 pb-3\"><div class=\"mb-3\"><div class=\"eyebrow px-2.5 mb-1.5\" style=\"font-size: 9px;\">Operate</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Command Center</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Battle Mode</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Pipeline</div></div><div class=\"mb-3\"><div class=\"eyebrow px-2.5 mb-1.5\" style=\"font-size: 9px;\">Train</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Coach</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Train</div><div class=\"nav-item active\"><span class=\"nav-dot\"></span>Objections</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Lead Sources</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>The Closer</div></div><div class=\"mb-3\"><div class=\"eyebrow px-2.5 mb-1.5\" style=\"font-size: 9px;\">Measure</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>War Room</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Analytics</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Business Plan</div></div></div><div class=\"px-4 py-4\" style=\"border-top: 1px solid var(--border);\"><div class=\"text-[10.5px]\" style=\"color: var(--muted-2);\">REALTOR® · Bakersfield, CA</div><div class=\"mono text-[10.5px] mt-0.5\" style=\"color: var(--muted-2);\">DRE# 01933129</div></div></div><div class=\"flex-1 min-w-0\"><div class=\"md:hidden flex items-center justify-between px-4 py-3 sticky top-0 z-30\" style=\"background: rgba(11, 13, 17, 0.92); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); padding-top: calc(12px + env(safe-area-inset-top));\"><span class=\"mono text-[14px] font-semibold\" style=\"letter-spacing: 0.3em;\">ALLEN <span style=\"color: var(--accent);\">OS</span></span><span class=\"text-[9.5px] eyebrow\">Sales. Systems. Execution.</span></div><div class=\"px-4 md:px-8 py-6\" style=\"max-width: 1080px; margin: 0px auto; padding-bottom: 110px;\"><div class=\"fade-up\"><div class=\"mb-5\"><div class=\"eyebrow mb-1.5\">Objections</div><h1 class=\"text-[26px] font-semibold tracking-tight m-0\" style=\"letter-spacing: -0.02em;\">The A → R → P System</h1><p class=\"m-0 mt-1 text-[13px]\" style=\"color: var(--muted);\">Nine objections. One operating system for all of them.</p></div><div class=\"card p-5 mb-5\"><div class=\"grid gap-3\" style=\"grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\"><div class=\"flex items-start gap-3\"><span class=\"mono text-[18px] font-semibold shrink-0 rounded-md\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.35); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;\">A</span><div><div class=\"text-[13px] font-semibold mb-0.5\">Acknowledge</div><p class=\"m-0 text-[11.5px] leading-snug\" style=\"color: var(--muted);\">\"Makes sense… fair enough.\" Agreeable acknowledgment — lower the defensiveness before anything else.</p></div></div><div class=\"flex items-start gap-3\"><span class=\"mono text-[18px] font-semibold shrink-0 rounded-md\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.35); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;\">R</span><div><div class=\"text-[13px] font-semibold mb-0.5\">Respond with permission</div><p class=\"m-0 text-[11.5px] leading-snug\" style=\"color: var(--muted);\">\"Can I ask you something before I let you go?\" Clarify and isolate: \"is that the only thing, or is there something else?\"</p></div></div><div class=\"flex items-start gap-3\"><span class=\"mono text-[18px] font-semibold shrink-0 rounded-md\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.35); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;\">P</span><div><div class=\"text-[13px] font-semibold mb-0.5\">Pivot</div><p class=\"m-0 text-[11.5px] leading-snug\" style=\"color: var(--muted);\">Pivot to a reverse-selling question, then land it: \"Because — you're not gonna do anything unless it makes sense, right?\"</p></div></div></div><p class=\"m-0 mt-4 text-[12px] font-medium\" style=\"color: rgb(251, 191, 36);\">Rule: resolving an objection WITHOUT closing for the next step = a failed rep.</p></div><div class=\"flex gap-1.5 mb-4\"><button class=\"btn\" style=\"border-color: var(--accent); color: var(--accent);\">Learn</button><button class=\"btn\" style=\"color: var(--muted);\">Practice</button><button class=\"btn\" style=\"color: var(--muted);\">Test</button></div><div class=\"flex flex-col gap-3\"><div class=\"card p-5\"><div class=\"flex items-center gap-2 flex-wrap mb-1.5\"><span class=\"text-[14px] font-semibold\">Already Have an Agent</span><span class=\"mono\" title=\"Permission — Control given is trust earned.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">PM</span><span class=\"mono\" title=\"ABC — Multiple choice. Surface the real reason.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">ABC</span><span class=\"mono\" title=\"Because — The landing gear. Cut in on the pause.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">BC</span></div><p class=\"m-0 mb-3 text-[13px]\" style=\"color: var(--muted); font-style: italic;\">\"We already have an agent.\"</p><div class=\"flex flex-col gap-1.5 mb-3\"><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">A — \"Makes sense — most people do.\"</div><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">R — \"Can I just ask you something about that before I let you go?\" (Soft check: \"the agent you're referring to isn't your sister-in-law, is it?\")</div><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">P — Are you already committed to relisting with them, or still deciding? Land the Because.</div></div><p class=\"m-0 mb-2 text-[13.5px] leading-relaxed\">Makes sense — most people do. Can I ask, before I let you go: are you already committed to relisting with them, or still deciding? … Wouldn't it make sense to at least get a second opinion before you commit — because you're not gonna do anything unless it makes sense anyway, right?</p><p class=\"m-0 text-[12px]\" style=\"color: var(--accent);\">Advance: Worth 15 minutes to compare strategies? (Note in FUB: is the agent a relative?)</p></div><div class=\"card p-5\"><div class=\"flex items-center gap-2 flex-wrap mb-1.5\"><span class=\"text-[14px] font-semibold\">Not Selling / Never Moving</span><span class=\"mono\" title=\"ABC — Multiple choice. Surface the real reason.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">ABC</span><span class=\"mono\" title=\"Reverse Presumptive — The takeaway. Presume the no.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">RP</span></div><p class=\"m-0 mb-3 text-[13px]\" style=\"color: var(--muted); font-style: italic;\">\"We're not selling. We're never moving.\"</p><div class=\"flex flex-col gap-1.5 mb-3\"><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">A — \"Makes sense, a lot of people feel that way.\"</div><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">R — \"Can I ask — is that because you've given up on moving, you don't think there's a buyer, or something else?\" (ABC)</div><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">P — Reverse presumptive: \"if I asked whether you'd ever sell, even for a great price, you'd probably laugh and say never, right?\"</div></div><p class=\"m-0 mb-2 text-[13.5px] leading-relaxed\">Makes sense, a lot of people feel that way. Can I ask — is that because you've given up on moving, you don't think there's a buyer, or something else? … And if I asked whether you'd ever sell, even for a great price, you'd probably laugh and say never, right?</p><p class=\"m-0 text-[12px]\" style=\"color: var(--accent);\">Advance: If truly no — run the Quality Lead script: get permission to follow up and a date.</p></div><div class=\"card p-5\"><div class=\"flex items-center gap-2 flex-wrap mb-1.5\"><span class=\"text-[14px] font-semibold\">Selling It Ourselves</span><span class=\"mono\" title=\"Emotional — Find the pain. Emotion drives the decision.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">EM</span><span class=\"mono\" title=\"Status Quo — Challenge inaction. Can they just stay?\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">SQ</span><span class=\"mono\" title=\"No-Oriented — Frame so 'no' means yes.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">NO</span></div><p class=\"m-0 mb-3 text-[13px]\" style=\"color: var(--muted); font-style: italic;\">\"We're selling it ourselves.\"</p><div class=\"flex flex-col gap-1.5 mb-3\"><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">A — \"That makes sense — a lot of owners start there.\"</div><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">R — \"What made you decide to try it on your own first?\"</div><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">P — \"If you could still net the number you want and skip the stress, would you be open to seeing your options?\"</div></div><p class=\"m-0 mb-2 text-[13.5px] leading-relaxed\">That makes sense — a lot of owners start there. What made you decide to try it on your own first? … If you could still net the number you want and skip the stress, would you be open to seeing your options?</p><p class=\"m-0 text-[12px]\" style=\"color: var(--accent);\">Advance: Would it hurt to get a second opinion on your strategy?</p></div><div class=\"card p-5\"><div class=\"flex items-center gap-2 flex-wrap mb-1.5\"><span class=\"text-[14px] font-semibold\">Commission Too High</span><span class=\"mono\" title=\"Permission — Control given is trust earned.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">PM</span><span class=\"mono\" title=\"Reverse Presumptive — The takeaway. Presume the no.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">RP</span><span class=\"mono\" title=\"No-Oriented — Frame so 'no' means yes.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">NO</span></div><p class=\"m-0 mb-3 text-[13px]\" style=\"color: var(--muted); font-style: italic;\">\"Your commission's too high. / How much do you charge?\"</p><div class=\"flex flex-col gap-1.5 mb-3\"><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">A — \"I hear you.\" / \"I'm really glad you brought that up…\"</div><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">R — \"Is the concern the commission itself, or your net number?\" (Biggest fear: \"if I told you I wasn't the cheapest agent, even if you believed I was the best, you'd never even consider meeting with me, right?\")</div><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">P — \"If a better strategy netted you more, would the fee still be the issue?\" Never defend the % — redirect to net.</div></div><p class=\"m-0 mb-2 text-[13.5px] leading-relaxed\">I hear you. Most sellers care less about the fee and more about what they actually walk away with. Is the concern the commission itself, or your net number? … If a better strategy netted you more, would the fee still be the issue?</p><p class=\"m-0 text-[12px]\" style=\"color: var(--accent);\">Advance: Worth comparing the numbers side by side?</p></div><div class=\"card p-5\"><div class=\"flex items-center gap-2 flex-wrap mb-1.5\"><span class=\"text-[14px] font-semibold\">Waiting / Market Will Get Better</span><span class=\"mono\" title=\"ABC — Multiple choice. Surface the real reason.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">ABC</span><span class=\"mono\" title=\"Socratic — Let the market argue for you.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">SO</span></div><p class=\"m-0 mb-3 text-[13px]\" style=\"color: var(--muted); font-style: italic;\">\"We're going to wait. The market will get better.\"</p><div class=\"flex flex-col gap-1.5 mb-3\"><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">A — \"Totally understand.\" / \"Yeah, fair enough…\"</div><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">R — \"What specifically are you waiting for?\" (ABC: \"is that because you've given up on moving, you don't believe there's a buyer, or something else?\")</div><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">P — \"What would need to happen for you to feel ready?\"</div></div><p class=\"m-0 mb-2 text-[13.5px] leading-relaxed\">Totally understand. What specifically are you waiting for? … And what would need to happen for you to feel ready?</p><p class=\"m-0 text-[12px]\" style=\"color: var(--accent);\">Advance: Make sense to build the plan now so you're ready when the timing's right?</p></div><div class=\"card p-5\"><div class=\"flex items-center gap-2 flex-wrap mb-1.5\"><span class=\"text-[14px] font-semibold\">Need to Think About It</span><span class=\"mono\" title=\"ABC — Multiple choice. Surface the real reason.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">ABC</span><span class=\"mono\" title=\"Permission — Control given is trust earned.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">PM</span></div><p class=\"m-0 mb-3 text-[13px]\" style=\"color: var(--muted); font-style: italic;\">\"We need to think about it.\"</p><div class=\"flex flex-col gap-1.5 mb-3\"><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">A — \"Of course.\"</div><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">R — Isolate: \"What specifically do you need to think through — the timing, the price, the process, or choosing the right agent?\"</div><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">P — Offer the low-pressure next step and land the Because.</div></div><p class=\"m-0 mb-2 text-[13.5px] leading-relaxed\">Of course. What specifically do you need to think through — is it the timing, the price, the process, or choosing the right agent?</p><p class=\"m-0 text-[12px]\" style=\"color: var(--accent);\">Advance: Would it help to talk those through for 10 minutes — then you decide?</p></div><div class=\"card p-5\"><div class=\"flex items-center gap-2 flex-wrap mb-1.5\"><span class=\"text-[14px] font-semibold\">Relisting With Same Agent</span><span class=\"mono\" title=\"Permission — Control given is trust earned.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">PM</span><span class=\"mono\" title=\"Socratic — Let the market argue for you.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">SO</span><span class=\"mono\" title=\"Because — The landing gear. Cut in on the pause.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">BC</span></div><p class=\"m-0 mb-3 text-[13px]\" style=\"color: var(--muted); font-style: italic;\">\"We're going to re-list with the same agent.\"</p><div class=\"flex flex-col gap-1.5 mb-3\"><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">A — \"Ok, fair, that's fair…\"</div><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">R — \"Can I ask you something about that before I let you go? I don't want to offend you — the agent you're referring to isn't your sister-in-law, is it?\"</div><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">P — \"Given that the agent failed to sell it the first time, would it not make sense to at least interview one other agent for a second opinion — because you're not gonna do anything unless it made sense anyway, right?\"</div></div><p class=\"m-0 mb-2 text-[13.5px] leading-relaxed\">Ok, fair, that's fair… Can I ask you something about that before I let you go? I don't want to offend you — the agent you're referring to isn't your sister-in-law, is it? … Ok, well I have to ask: given that the agent failed to sell it the first time, would it not make sense to at least interview one other agent to get a second opinion — because, let's face it, you're not gonna do anything unless it made sense anyway, right?</p><p class=\"m-0 text-[12px]\" style=\"color: var(--accent);\">Advance: Book the second-opinion meeting before they re-sign.</p></div><div class=\"card p-5\"><div class=\"flex items-center gap-2 flex-wrap mb-1.5\"><span class=\"text-[14px] font-semibold\">\"Do You Have a Buyer?\"</span><span class=\"mono\" title=\"Permission — Control given is trust earned.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">PM</span><span class=\"mono\" title=\"Reverse Presumptive — The takeaway. Presume the no.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">RP</span></div><p class=\"m-0 mb-3 text-[13px]\" style=\"color: var(--muted); font-style: italic;\">\"Do you have a buyer?\"</p><div class=\"flex flex-col gap-1.5 mb-3\"><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">A — \"That's a good question, I'm glad you brought that up…\"</div><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">R — \"I'm sure there's a ton of agents misleading you saying they have a buyer when they don't — which I won't do. Can I share my biggest fear before I let you go?\"</div><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">P — Reverse presumptive: \"if I told you I don't have a specific buyer right now, it wouldn't matter what I said next — you probably wouldn't even hear me out, would that be fair?\"</div></div><p class=\"m-0 mb-2 text-[13.5px] leading-relaxed\">That's a good question, I'm glad you brought that up… And I'm sure there's a ton of agents out there misleading you saying they have a buyer when they don't, which I won't do. So can I share my biggest fear before I let you go? … I get the feeling that if I told you I don't have a specific buyer right now, it wouldn't matter what I said next — you probably wouldn't even hear me out. Would that be fair?</p><p class=\"m-0 text-[12px]\" style=\"color: var(--accent);\">Advance: Honesty becomes the differentiator — pivot to the plan that creates buyers, then close the meeting.</p></div><div class=\"card p-5\"><div class=\"flex items-center gap-2 flex-wrap mb-1.5\"><span class=\"text-[14px] font-semibold\">\"What Will You Do Differently?\"</span><span class=\"mono\" title=\"Permission — Control given is trust earned.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">PM</span><span class=\"mono\" title=\"Reverse Presumptive — The takeaway. Presume the no.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">RP</span></div><p class=\"m-0 mb-3 text-[13px]\" style=\"color: var(--muted); font-style: italic;\">\"What are you going to do differently to sell my house?\"</p><div class=\"flex flex-col gap-1.5 mb-3\"><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">A — \"I'm really glad you brought that up…\"</div><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">R — \"I'm going to tell you — but can I share my biggest fear?\"</div><div class=\"text-[12.5px] leading-snug rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);\">P — \"If I took the next few minutes telling you everything I do differently — A, you probably wouldn't believe me, and B, you probably wouldn't meet with me anyways. Would that be fair?\"</div></div><p class=\"m-0 mb-2 text-[13.5px] leading-relaxed\">I'm really glad you brought that up… And I'm going to tell you, but can I share my biggest fear? … I get the feeling that if I were to take the next few minutes and tell you all the things I do differently — A, you probably wouldn't believe me, and B, you probably wouldn't meet with me anyways. Would that be fair?</p><p class=\"m-0 text-[12px]\" style=\"color: var(--accent);\">Advance: The plan is shown, not told — that's the reason the meeting exists. Close the day.</p></div></div></div></div></div><div class=\"bottom-nav md:hidden\"><button class=\"bottom-nav-item\"><span class=\"bn-dot\"></span>Command</button><button class=\"bottom-nav-item\"><span class=\"bn-dot\"></span>Battle</button><button class=\"bottom-nav-item\"><span class=\"bn-dot\"></span>Pipeline</button><button class=\"bottom-nav-item\"><span class=\"bn-dot\"></span>Coach</button><button class=\"bottom-nav-item active\"><span class=\"bn-dot\"></span>More</button></div></div>","sources":"<div class=\"flex min-h-screen\"><div class=\"hidden md:flex flex-col items-center justify-center shrink-0\" style=\"width: 58px; border-right: 1px solid var(--border); background: rgb(11, 13, 17); position: sticky; top: 0px; height: 100vh;\"><div class=\"mono\" style=\"writing-mode: vertical-rl; transform: rotate(180deg); font-size: 21px; letter-spacing: 0.46em; font-weight: 600; color: var(--text); user-select: none;\">ALLEN <span style=\"color: var(--accent);\">OS</span></div></div><div class=\"hidden md:flex flex-col shrink-0\" style=\"width: 200px; border-right: 1px solid var(--border); background: rgb(11, 13, 17); position: sticky; top: 0px; height: 100vh;\"><div class=\"px-4 pt-5 pb-3\"><div class=\"eyebrow\">Sales. Systems. Execution.</div></div><div class=\"flex-1 overflow-y-auto px-2.5 pb-3\"><div class=\"mb-3\"><div class=\"eyebrow px-2.5 mb-1.5\" style=\"font-size: 9px;\">Operate</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Command Center</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Battle Mode</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Pipeline</div></div><div class=\"mb-3\"><div class=\"eyebrow px-2.5 mb-1.5\" style=\"font-size: 9px;\">Train</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Coach</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Train</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Objections</div><div class=\"nav-item active\"><span class=\"nav-dot\"></span>Lead Sources</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>The Closer</div></div><div class=\"mb-3\"><div class=\"eyebrow px-2.5 mb-1.5\" style=\"font-size: 9px;\">Measure</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>War Room</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Analytics</div><div class=\"nav-item\"><span class=\"nav-dot\"></span>Business Plan</div></div></div><div class=\"px-4 py-4\" style=\"border-top: 1px solid var(--border);\"><div class=\"text-[10.5px]\" style=\"color: var(--muted-2);\">REALTOR® · Bakersfield, CA</div><div class=\"mono text-[10.5px] mt-0.5\" style=\"color: var(--muted-2);\">DRE# 01933129</div></div></div><div class=\"flex-1 min-w-0\"><div class=\"md:hidden flex items-center justify-between px-4 py-3 sticky top-0 z-30\" style=\"background: rgba(11, 13, 17, 0.92); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); padding-top: calc(12px + env(safe-area-inset-top));\"><span class=\"mono text-[14px] font-semibold\" style=\"letter-spacing: 0.3em;\">ALLEN <span style=\"color: var(--accent);\">OS</span></span><span class=\"text-[9.5px] eyebrow\">Sales. Systems. Execution.</span></div><div class=\"px-4 md:px-8 py-6\" style=\"max-width: 1080px; margin: 0px auto; padding-bottom: 110px;\"><div class=\"fade-up\"><div class=\"mb-5\"><div class=\"eyebrow mb-1.5\">Lead Sources</div><h1 class=\"text-[26px] font-semibold tracking-tight m-0\" style=\"letter-spacing: -0.02em;\">Call Flow Cards</h1><p class=\"m-0 mt-1 text-[13px]\" style=\"color: var(--muted);\">Six sources. One pattern. Only the opening changes.</p></div><div class=\"flex gap-1.5 flex-wrap mb-4\"><button class=\"btn\" style=\"border-color: var(--accent); color: var(--accent);\">Expired</button><button class=\"btn\" style=\"color: var(--muted);\">FSBO</button><button class=\"btn\" style=\"color: var(--muted);\">Absentee</button><button class=\"btn\" style=\"color: var(--muted);\">FRBO</button><button class=\"btn\" style=\"color: var(--muted);\">Circle</button><button class=\"btn\" style=\"color: var(--muted);\">Probate</button><div class=\"ml-auto flex gap-1.5\"><button class=\"btn\" style=\"border-color: var(--accent); color: var(--accent);\">Flow Card</button><button class=\"btn\" style=\"color: var(--muted);\">Master Script</button></div></div><div class=\"grid gap-3 mb-4\" style=\"grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));\"><div class=\"card p-4\"><div class=\"eyebrow mb-1.5\">Goal</div><p class=\"m-0 text-[13px] leading-snug\">Book the listing consult. (Backup: qualified lead + permission to follow up.)</p></div><div class=\"card p-4\"><div class=\"eyebrow mb-1.5\">Mindset</div><p class=\"m-0 text-[13px] leading-snug\">Curious · calm · zero pressure. Less talking, more questions. Let silence work.</p></div></div><div class=\"flex flex-col gap-2.5 mb-4\"><div class=\"card p-4\"><div class=\"flex items-center gap-2 flex-wrap mb-1.5\"><span class=\"mono text-[13px] font-semibold\" style=\"color: var(--accent);\">1</span><span class=\"text-[13px] font-semibold\">Pattern Interrupt</span><span class=\"mono\" title=\"Pattern Interrupt — Lower resistance. Give control away.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">PI</span></div><p class=\"m-0 text-[13.5px] leading-relaxed mb-1.5\">Hi, is this Tom? … Tom, this is Mark. Look, I'll be upfront — I'm a Realtor, and before you hang up, I was hoping to ask you something real quick. Would that be okay?</p><p class=\"m-0 text-[11.5px] leading-snug\" style=\"color: var(--muted-2); font-style: italic;\">Pause — let him answer. You just handed him control; that's what disarms him.</p></div><div class=\"card p-4\"><div class=\"flex items-center gap-2 flex-wrap mb-1.5\"><span class=\"mono text-[13px] font-semibold\" style=\"color: var(--accent);\">2</span><span class=\"text-[13px] font-semibold\">Assumptive Hook</span><span class=\"mono\" title=\"Presumptive — Assume it forward; ask the detail.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">PQ</span></div><p class=\"m-0 text-[13.5px] leading-relaxed mb-1.5\">I appreciate that. I was calling about the home on ABC Street — saw it came off the market. I'm assuming that's because you already sold it, right?</p><p class=\"m-0 text-[11.5px] leading-snug\" style=\"color: var(--muted-2); font-style: italic;\">He'll usually correct you: \"No, it didn't sell.\"</p></div><div class=\"card p-4\"><div class=\"flex items-center gap-2 flex-wrap mb-1.5\"><span class=\"mono text-[13px] font-semibold\" style=\"color: var(--accent);\">3</span><span class=\"text-[13px] font-semibold\">ABC Question</span><span class=\"mono\" title=\"ABC — Multiple choice. Surface the real reason.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">ABC</span></div><p class=\"m-0 text-[13.5px] leading-relaxed mb-1.5\">Interesting. Is that because you didn't get any offers, the offers came in too low, or was it something else?</p><p class=\"m-0 text-[11.5px] leading-snug\" style=\"color: var(--muted-2); font-style: italic;\">Let him talk. Do not fill the silence.</p></div><div class=\"card p-4\"><div class=\"flex items-center gap-2 flex-wrap mb-1.5\"><span class=\"mono text-[13px] font-semibold\" style=\"color: var(--accent);\">4</span><span class=\"text-[13px] font-semibold\">Emotional Dig</span><span class=\"mono\" title=\"Emotional — Find the pain. Emotion drives the decision.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">EM</span></div><p class=\"m-0 text-[13.5px] leading-relaxed mb-1.5\">And when your agent let you know it was coming off the market, what'd they say was the reason it didn't sell?</p><p class=\"m-0 text-[11.5px] leading-snug\" style=\"color: var(--muted-2); font-style: italic;\">Listen for frustration / blame / confusion — that's your motivation signal.</p></div><div class=\"card p-4\"><div class=\"flex items-center gap-2 flex-wrap mb-1.5\"><span class=\"mono text-[13px] font-semibold\" style=\"color: var(--accent);\">5</span><span class=\"text-[13px] font-semibold\">Discovery</span><span class=\"mono\" title=\"Status Quo — Challenge inaction. Can they just stay?\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">SQ</span><span class=\"mono\" title=\"Emotional — Find the pain. Emotion drives the decision.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">EM</span></div><p class=\"m-0 text-[13.5px] leading-relaxed mb-1.5\">When you first decided to sell — where were you hoping to head to, Tom? … And how soon did you need to be there? … What do you think kept it from selling? … If you could wave a wand and have this handled — what's that look like?</p><p class=\"m-0 text-[11.5px] leading-snug\" style=\"color: var(--muted-2); font-style: italic;\">Motivation · timeline · obstacle · desired outcome. Ask, never pitch.</p></div><div class=\"card p-4\"><div class=\"flex items-center gap-2 flex-wrap mb-1.5\"><span class=\"mono text-[13px] font-semibold\" style=\"color: var(--accent);\">6</span><span class=\"text-[13px] font-semibold\">Relationship Check</span><span class=\"mono\" title=\"Permission — Control given is trust earned.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">PM</span><span class=\"mono\" title=\"ABC — Multiple choice. Surface the real reason.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">ABC</span></div><p class=\"m-0 text-[13.5px] leading-relaxed mb-1.5\">Can I ask you something, Tom — and I don't want to step on any toes — are you planning to relist with the same agent, or are you weighing your options?</p><p class=\"m-0 text-[11.5px] leading-snug\" style=\"color: var(--muted-2); font-style: italic;\">Permission-based. You're mapping the decision, not pitching.</p></div><div class=\"card p-4\"><div class=\"flex items-center gap-2 flex-wrap mb-1.5\"><span class=\"mono text-[13px] font-semibold\" style=\"color: var(--accent);\">7</span><span class=\"text-[13px] font-semibold\">Appointment Close</span><span class=\"mono\" title=\"Permission — Control given is trust earned.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">PM</span><span class=\"mono\" title=\"Hypothetical / Future Pace — Let them live the outcome first.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">HY</span><span class=\"mono\" title=\"No-Oriented — Frame so 'no' means yes.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">NO</span><span class=\"mono\" title=\"Because — The landing gear. Cut in on the pause.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">BC</span></div><p class=\"m-0 text-[13.5px] leading-relaxed mb-1.5\">Look, I'll be upfront — I don't know if I'm the right agent for you; you'll decide that. But let's pretend we met, and after you saw my plan you genuinely believed I could sell your home and get you to [Tom's outcome]… would there be any reason you wouldn't at least want to explore it? … Because — let's face it, Tom, you're not gonna do anything unless it makes sense, right? … Great — does [day] at [time] work, or would [alt] be better?</p><p class=\"m-0 text-[11.5px] leading-snug\" style=\"color: var(--muted-2); font-style: italic;\">Autonomy → future-pace → no-oriented → Because. Pause, then cut in the second he speaks. Close the day.</p></div></div><div class=\"card p-5\"><div class=\"eyebrow mb-1\">Routing — no call ends without a next step</div><div class=\"mt-3 flex flex-col gap-1.5\"><div class=\"flex items-start gap-3 rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border);\"><span class=\"text-[12.5px] font-medium\" style=\"min-width: 42%;\">Interested</span><span class=\"text-[12.5px]\" style=\"color: var(--accent);\">→ Book appt — confirm address, who's there, time</span></div><div class=\"flex items-start gap-3 rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border);\"><span class=\"text-[12.5px] font-medium\" style=\"min-width: 42%;\">Warm, not now</span><span class=\"text-[12.5px]\" style=\"color: var(--accent);\">→ Get permission + set the follow-up date</span></div><div class=\"flex items-start gap-3 rounded-lg px-3 py-2\" style=\"background: var(--surface-2); border: 1px solid var(--border);\"><span class=\"text-[12.5px] font-medium\" style=\"min-width: 42%;\">Not selling</span><span class=\"text-[12.5px]\" style=\"color: var(--accent);\">→ Ask for a referral, log + nurture</span></div><div class=\"flex items-start gap-3 rounded-lg px-3 py-2\" style=\"bac -size: 9.5px;\">pause first, cut in the second they speak</div><p class=\"m-0 text-[13.5px] leading-relaxed\">Because — let's face it, you're not gonna do anything unless it makes sense, right?</p><div class=\"flex gap-1 mt-1.5\"><span class=\"mono\" title=\"Because — The landing gear. Cut in on the pause.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">BC</span></div></div><div class=\"rounded-lg px-3.5 py-2.5\" style=\"background: var(--surface-2); border: 1px solid var(--border);\"><div class=\"eyebrow mb-1\" style=\"font-size: 9.5px;\">close the day</div><p class=\"m-0 text-[13.5px] leading-relaxed\">What day makes sense for us to get together — would [day] or [alt] be better?</p><div class=\"flex gap-1 mt-1.5\"><span class=\"mono\" title=\"Permission — Control given is trust earned.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">PM</span></div></div></div></div><div class=\"card p-5\"><div class=\"text-[15px] font-semibold mb-0.5\">B · If They Won't Book</div><p class=\"m-0 mb-3.5 text-[12px]\" style=\"color: var(--muted-2);\">Not a hard no = Quality Lead. Leave with a date, not a hope.</p><div class=\"flex flex-col gap-2.5\"><div class=\"rounded-lg px-3.5 py-2.5\" style=\"background: var(--surface-2); border: 1px solid var(--border);\"><p class=\"m-0 text-[13.5px] leading-relaxed\">Fair enough — can I ask a favor before you go, and you can be honest?</p><div class=\"flex gap-1 mt-1.5\"><span class=\"mono\" title=\"Permission — Control given is trust earned.\" style=\"color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;\">PM</span></div></div><div class }
function streak(){
  let n=0;const d=new Date;
  for(let i=0;i<730;i++){
    const k=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    if(dayQualifies(k))n++;
    else if(i>0)break;
    d.setDate(d.getDate()-1);
  }
  return n;
}
/* most recent past day that had a contract or activity but no reconciliation */
function pendingRecon(){
  const keys=new Set([...Object.keys(S.contracts),...Object.keys(S.days)]);
  const past=[...keys].filter(k=>k<dayKey()&&!S.recons[k]&&(S.contracts[k]||(S.days[k]&&S.days[k].contacts>0))).sort();
  return past.pop()||null;
}

/* ================= UPGRADE 1: Follow-Up Command — cadence engine ================= */
const CADENCE_DAYS={HOT:3,WARM:7,NURTURE:30};
function daysSince(dateStr){
  if(!dateStr)return 9999;
  const then=new Date(dateStr+'T12:00:00');
  return Math.floor((Date.now()-then.getTime())/864e5);
}
function dueStatus(lead){
  const last=lead.lastTouch||lead.created||lead.date;
  const gap=daysSince(last);
  const limit=CADENCE_DAYS[lead.stage]||7;
  if(gap>limit)return{state:'overdue',days:gap-limit};
  if(gap===limit)return{state:'due',days:0};
  return{state:'ok',days:limit-gap};
}
function dueLeads(){
  return S.leads.map(l=>({l,d:dueStatus(l)})).filter(x=>x.d.state!=='ok')
    .sort((a,b)=>(b.d.state==='overdue')-(a.d.state==='overdue')||b.d.days-a.d.days);
}
function touchLead(id){
  const l=S.leads.find(x=>x.id===id);if(!l)return;
  l.lastTouch=dayKey();
  l.touches=(l.touches||[]);l.touches.push(dayKey());
  save();
  if(navigator.vibrate)navigator.vibrate(8);
}

/* ================= UPGRADE 3: Source Intelligence — outcome ledger ================= */
function logOutcome(source,kind,n=1){
  if(!source)return;
  const d=dayKey();
  S.outcomes[d]=S.outcomes[d]||{};
  S.outcomes[d][source]=S.outcomes[d][source]||{};
  S.outcomes[d][source][kind]=(S.outcomes[d][source][kind]||0)+n;
}
function sourceTotals(){
  const tot={};
  for(const d in S.outcomes)for(const src in S.outcomes[d]){
    tot[src]=tot[src]||{dials:0,contacts:0,conversations:0,leads:0,appointments:0};
    for(const k in S.outcomes[d][src])if(k in tot[src])tot[src][k]+=S.outcomes[d][src][k];
  }
  return tot;
}

function savePE(x){try{localStorage.setItem(PE_KEY,JSON.stringify(x));}catch(e){}}
function pct(n){return isFinite(n)?Math.round(n*100)+'%':'—';}
function one(n){return isFinite(n)?n.toFixed(1)+'%':'—';}
function ceil(n){return Math.ceil(Math.max(0,n));}
function dateKeyOffset(daysBack){const d=new Date();d.setDate(d.getDate()-daysBack);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function activityTotals(startKey){
  const t=blank();let listings=0,closings=0,days=0;

/* pace: required contacts/hr across remaining call-block time today */
function blockHoursRemaining(){
  const now=nowMins();
  let mins=0;
  DATA.schedule.filter(b=>b.isCallBlock).forEach(b=>{
    const s2=toMins(b.start),e2=toMins(b.end);
    if(now<s2)mins+=e2-s2;
    else if(now<e2)mins+=e2-now;
  });
  return mins/60;
}
function paceInfo(){
  const t=today(),g=targets();
  const remaining=Math.max(0,g.contacts-t.contacts);
  const hrs=blockHoursRemaining();
  const need=hrs>0?remaining/hrs:remaining>0?Infinity:0;
  let now2=0;
  if(inBattle&&sessionStart){
    const el=(Date.now()-sessionStart)/36e5;
    if(el>0.15)now2=sessionTally.contacts/el;
  }
  return{remaining,hrs,need,now:now2};
}

    conversations:g.conversations?Math.min(1,t.conversations/g.conversations):0,
    appointments:g.appointments?Math.min(1,t.appointments/g.appointments):0

  const gaps=[
    {key:'contacts',label:'Contacts',done:t.contacts||0,goal:g.contacts||0,pct:score.contacts},
    {key:'conversations',label:'Conversations',done:t.conversations||0,goal:g.conversations||0,pct:score.conversations},
    {key:'appointments',label:'Appointments',done:t.appointments||0,goal:g.appointments||0,pct:score.appointments}
  ].sort((a,b)=>a.pct-b.pct);

  let drill='Pattern Interrupt + Opening Question';

function gauntletItems(){
  const items=[];
  DATA.objections.forEach(o=>items.push({
    id:'obj:'+o.id,cat:'Objection',name:o.name,
    prompt:'Seller says: "'+o.sellerSays+'"\n\nDeliver your full handle out loud — Acknowledge, then permission, then pivot. Flip when done.',
    answer:o.framework.join('\n\n'),codes:o.codes||[],
  }));
  DATA.questionTypes.forEach(q=>items.push({
    id:'qt:'+q.code,cat:'Question Type',name:q.name,
    prompt:'['+q.code+'] '+q.name+' — say two examples out loud, from memory. Flip to check.',
    answer:q.purpose+'\n\n'+q.examples.map((e,i)=>(i+1)+'. '+e).join('\n\n'),codes:[q.code],
  }));
  DATA.scripts.forEach(s2=>items.push({
    id:'open:'+s2.id,cat:'Opener',name:s2.name+' opener',
    prompt:'Deliver the '+s2.name+' opener, word for word. Flip to check.',
    answer:s2.steps[0].script+(s2.steps[0].note?'\n\n('+s2.steps[0].note+')':''),codes:s2.steps[0].tags||[],
  }));
  return items;
}
/* SM-2-lite: grade 5 = Nailed, 3 = Shaky, 1 = Blank */
function gradeItem(id,grade){
  const g=S.gauntlet;
  const st=g.items[id]||{ease:2.5,interval:0,due:dayKey(),hist:[]};
  st.hist.push({d:dayKey(),g:grade});
  if(grade<3){st.interval=0;st.ease=Math.max(1.3,st.ease-0.2);}
  else{
    st.interval=st.interval===0?1:st.interval===1?3:Math.round(st.interval*st.ease);
    if(grade===5)st.ease=Math.min(2.8,st.ease+0.05);else st.ease=Math.max(1.3,st.ease-0.1);
  }
  const d=new Date();d.setDate(d.getDate()+Math.max(st.interval,grade<3?0:1));
  st.due=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  g.items[id]=st;save();
}
function gauntletQueue(){
  const all=gauntletItems(),g=S.gauntlet,today2=dayKey();
  const due=all.filter(it=>{const st=g.items[it.id];return st&&st.due<=today2;});
  const fresh=all.filter(it=>!g.items[it.id]);
  /* genome-weighted: stages graded weak in the Film Room push related codes to the front;
     objections that actually occur on your calls (Wingman telemetry) drill first */
  const weak=Object.entries(S.genome.stages).filter(([,v])=>v.avg&&v.avg<6).flatMap(([k,v])=>v.codes||[]);
  const hits=objectionTotals();
  const boost=it=>{
    let b=0;
    if(it.codes.some(c=>weak.includes(c)))b-=1;
    if(it.id.startsWith('obj:')&&hits[it.id.slice(4)])b-=Math.min(2,hits[it.id.slice(4)]/5);
    return b;
  };
  return [...due,...fresh].sort((a,b)=>boost(a)-boost(b)).slice(0,10);
}
function gauntletMastery(){
  const g=S.gauntlet,all=gauntletItems();
  let sum=0,n=0;
  all.forEach(it=>{const st=g.items[it.id];if(st&&st.hist.length){sum+=st.hist[st.hist.length-1].g;n++;}});
  return n?Math.round(sum/n/5*100):0;
}
function gauntletStreak(){
  let n=0;const d=new Date();
  for(let i=0;i<365;i++){
    const k=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    if(S.gauntlet.history[k])n++;
    else if(i>0)break;
    d.setDate(d.getDate()-1);
  }
  return n;
}

  }else{
    html+='<div class="flex items-center gap-2 mb-4 px-1"><span class="w-[7px] h-[7px] rounded-full live-dot shrink-0" style="background: var(--good, #22C55E);"></span>'+
      '<span class="mono text-[10.5px]" style="color: var(--muted-2);">CONTRACT SIGNED '+(tc.at||'')+' — '+tc.contacts+' contacts · '+tc.conversations+' convos · '+tc.appointments+' appt'+(tc.appointments>1?'s':'')+'</span></div>';
  }
  /* Due Today (Follow-Up Command) */
  const due=dueLeads();

      '<div class="eyebrow" style="color: var(--bad, #EF4444);">Follow-Up Command — '+due.length+' file'+(due.length>1?'s':'')+' due</div>'+
      '<div class="text-[10.5px] mono" style="color: var(--muted-2);">'+counts.HOT+' hot · '+counts.WARM+' warm · '+counts.NURTURE+' nurture</div></div>'+
      '<div class="flex flex-col gap-1.5">'+
      due.slice(0,6).map(x=>

        '<span class="mono text-[10.5px] shrink-0 hidden sm:inline" style="color: var(--muted-2);">'+esc(x.l.source||'')+'</span>'+
        '<button class="btn ml-auto shrink-0" data-touch="'+x.l.id+'" style="padding: 3px 10px; font-size: 11px; color: var(--good, #22C55E); border-color: rgba(34, 197, 94, 0.35);">Touched</button>'+
        '<button class="btn shrink-0" data-callscript="'+esc(x.l.source||'')+'" style="padding: 3px 10px; font-size: 11px; color: var(--muted);">Script</button>'+
        '</div>').join('')+
      (due.length>6?'<div class="text-[10.5px] mono px-1" style="color: var(--muted-2);">+ '+(due.length-6)+' more in Pipeline</div>':'')+
      '</div></div>';
  }
  /* Training Gate (Gauntlet) */
  const doneToday=!!S.gauntlet.history[dayKey()];
  const qLen=doneToday?0:gauntletQueue().length;
  html+='<div class="card p-5 mb-4"'+(doneToday?'':' style="border-color: rgba(96, 165, 250, 0.3);"')+'>'+
    '<div class="flex items-center justify-between flex-wrap gap-3">'+
    '<div><div class="eyebrow mb-1" style="color: '+(doneToday?'var(--good, #22C55E)':'var(--accent)')+';">Training Gate</div>'+
    '<div class="text-[14px] font-semibold">'+(doneToday?'BATTLE READY — gauntlet complete':qLen+' rep'+(qLen===1?'':'s')+' due before the phones')+'</div>'+
    '<div class="text-[10.5px] mono mt-1" style="color: var(--muted-2);">Mastery '+gauntletMastery()+'% · streak '+gauntletStreak()+' day'+(gauntletStreak()===1?'':'s')+'</div></div>'+
    (doneToday?'<button class="btn" id="g-again" style="color: var(--muted);">Extra reps</button>'
      :'<button class="btn btn-accent" id="g-start">Run the Gauntlet</button>')+
    '</div></div>';
  /* Dial Order (Source Intelligence) */
  const tot=sourceTotals();
  const ranked=Object.entries(tot).filter(([,v])=>v.contacts>=25)
    .map(([s2,v])=>({s:s2,rate:v.contacts?v.appointments/v.contacts:0,v}))
    .sort((a,b)=>b.rate-a.rate);
  if(ranked.length>=2){
    const best=ranked[0],worst=ranked[ranked.length-1];
    const name=id=>{const sc=DATA.scripts.find(x=>x.id===id);return sc?sc.name:id;};
    html+='<div class="card p-5 mb-4"><div class="eyebrow mb-2">Dial Order — what your data says</div>'+

      (best.rate*100).toFixed(1)+'% contact→appt vs '+(worst.rate*100).toFixed(1)+'% on '+esc(name(worst.s))+'. Full table in Analytics.</p></div>';
  }
  wrap.innerHTML=html;
  mission.after(wrap);
  $$('button[data-touch]',wrap).forEach(b=>b.addEventListener('click',()=>{touchLead(b.dataset.touch);insertCommandCards();}));
  $$('button[data-callscript]',wrap).forEach(b=>b.addEventListener('click',()=>{
    const sc=DATA.scripts.find(x=>x.name===b.dataset.callscript||x.id===b.dataset.callscript);
    if(sc)scriptIdx=DATA.scripts.indexOf(sc);
    route('battle');openBattle();
  }));
  const gs=$1('#g-start',wrap)||$1('#g-again',wrap);
  if(gs)gs.addEventListener('click',()=>{if(gs.id==='g-again')S.gauntlet.history[dayKey()]=false;openGauntlet();});
  /* contract + reconciliation wiring */
  const sign=$1('#contract-sign',wrap);
  if(sign)sign.addEventListener('click',()=>{
    const g2=targets(),c={at:(()=>{const d=new Date();let h=d.getHours();const ap=h>=12?'PM':'AM';h=h%12||12;return h+':'+pad(d.getMinutes())+' '+ap;})()};
    $$('input[data-contract]',wrap).forEach(inp=>{
      const k=inp.dataset.contract;
      c[k]=Math.max(g2[k],parseInt(inp.value,10)||g2[k]);
    });
    S.contracts[dayKey()]=c;save();
    if(navigator.vibrate)navigator.vibrate([20,40,20]);
    insertCommandCards();
  });
  $$('#recon-why button',wrap).forEach(b=>b.addEventListener('click',()=>{
    const pr2=pendingRecon();if(!pr2)return;
    let note='';
    if(b.dataset.why==='Life happened'||b.dataset.why==='List / contact-rate problem'){
      note=prompt('One line for the record — what specifically?')||'';
    }
    S.recons[pr2]={why:b.dataset.why,note,at:dayKey()};
    save();insertCommandCards();
  }));
}

/* ================= BATTLE ================= */
let timerLeft=50*60,timerIv2=null,timerOn=false,wakeLock=null;
let scriptIdx=0,stepIdx=0,keyHandler=null;
function hydrateBattle(){
  refreshCounts();
  const enter=$$('button',root).find(b=>b.textContent.includes('Enter Battle Mode'));
  if(enter)enter.addEventListener('click',openBattle);
  /* keyboard legend gains the D key */
  const legend=$$('p',root).find(p=>p.textContent.includes('Keyboard:'));
  if(legend&&!legend.textContent.includes('dial'))
    legend.innerHTML='Keyboard: <span class="kbd">D</span> dial · <span class="kbd">C</span> contact (counts a dial) · <span class="kbd">V</span> conversation · <span class="kbd">L</span> lead · <span class="kbd">A</span> appointment · <span class="kbd">←</span><span class="kbd">→</span> script steps · <span class="kbd">esc</span> exit';
}
async function openBattle(){
  const host=document.createElement('div');
  host.innerHTML=T.battleOverlay;
  const ov=host.firstElementChild;
  document.body.appendChild(ov);
  document.body.style.overflow='hidden';
  stepIdx=0;sessionConvos=0;inBattle=true;
  sessionStart=Date.now();
  sessionTally={dials:0,contacts:0,conversations:0,leads:0,appointments:0};
  bindOverlay(ov);
  renderStep(ov);
  refreshCounts();
  timerLeft=50*60;timerOn=true;startTimer(ov);
  try{if('wakeLock'in navigator)wakeLock=await navigator.wakeLock.request('screen');}catch(e){}
  keyHandler=e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    const k=e.key.toLowerCase();
    if(k==='d')bump('dials',1,battleSource());
    else if(k==='c'){bump('dials',1,battleSource());bump('contacts',1,battleSource());}
    else if(k==='v')bump('conversations',1,battleSource());
    else if(k==='l')bump('leads',1,battleSource());
    else if(k==='a')bump('appointments',1,battleSource());
    else if(k==='arrowleft'){stepIdx=Math.max(0,stepIdx-1);renderStep(ov);}
    else if(k==='arrowright'){stepIdx=Math.min(DATA.scripts[scriptIdx].steps.length-1,stepIdx+1);renderStep(ov);}
    else if(k==='escape')closeBattle(ov);
  };
  window.addEventListener('keydown',keyHandler);
}
function closeBattle(ov){
  ov.remove();
  document.body.style.overflow='';
  inBattle=false;
  /* persist the session for block-level analytics */
  if(sessionStart&&sessionTally&&Object.values(sessionTally).some(v=>v>0)){
    const live=liveBlock();
    S.sessions.push({
      d:dayKey(),block:live?live.label:'off-schedule',source:battleSource(),
      minutes:Math.round((Date.now()-sessionStart)/6e4),...sessionTally,
    });
    if(S.sessions.length>500)S.sessions=S.sessions.slice(-500);
    save();
  }
  sessionStart=null;sessionTally=null;
  if(keyHandler){window.removeEventListener('keydown',keyHandler);keyHandler=null;}
  if(timerIv2){clearInterval(timerIv2);timerIv2=null;}
  if(wakeLock){wakeLock.release().catch(()=>{});wakeLock=null;}
  refreshCounts();
  /* Follow-Up Command: conversations belong in the pipeline */
  if(sessionConvos>0&&confirm(sessionConvos+' conversation'+(sessionConvos>1?'s':'')+' this session — add any to the pipeline?')){
    route('pipeline');
    const nameInput=$1('.card.p-4 input.input',root);
    if(nameInput)nameInput.focus();
  }
  sessionConvos=0;
}
function startTimer(ov){
  const span=$$('.mono.text-\\[22px\\]',ov)[0];
  const draw=()=>{if(span){span.textContent=pad(Math.floor(timerLeft/60))+':'+pad(timerLeft%60);span.style.color=timerLeft<300?'var(--bad, #EF4444)':'var(--accent)';}};
  draw();
  if(timerIv2)clearInterval(timerIv2);
  timerIv2=setInterval(()=>{
    if(!timerOn)return;
    timerLeft=Math.max(0,timerLeft-1);draw();
    if(timerLeft===0){timerOn=false;if(navigator.vibrate)navigator.vibrate([220,90,220]);}
  },1000);
  if(span){span.style.cursor='pointer';span.title='Tap to pause/resume';span.addEventListener('click',()=>{timerOn=!timerOn;});}
}
function bindOverlay(ov){
  // header: presets + exit
  $$('button',ov).forEach(b=>{
    const t=b.textContent.trim();
    if(/^(30|50|90)m$/.test(t)){
      b.addEventListener('click',()=>{
        timerLeft=parseInt(t)*60;timerOn=true;
        $$('button',ov).forEach(x=>{
          if(/^(30|50|90)m$/.test(x.textContent.trim())){x.style.borderColor='';x.style.color='var(--muted)';}
        });
        b.style.borderColor='var(--accent)';b.style.color='var(--accent)';
      });
    }else if(t==='Exit')b.addEventListener('click',()=>closeBattle(ov));
    else if(t==='← Prev')b.addEventListener('click',()=>{stepIdx=Math.max(0,stepIdx-1);renderStep(ov);});
    else if(t==='Next →')b.addEventListener('click',()=>{stepIdx=Math.min(DATA.scripts[scriptIdx].steps.length-1,stepIdx+1);renderStep(ov);});
    else if(t==='Restart')b.addEventListener('click',()=>{stepIdx=0;renderStep(ov);});
  });
  // script chips
  const chips=$$('button',ov).filter(b=>DATA.scripts.some(s=>s.name===b.textContent.trim()));
  const paintChips=()=>{
    chips.forEach(x=>{
      const on=DATA.scripts[scriptIdx]&&x.textContent.trim()===DATA.scripts[scriptIdx].name;
      x.style.borderColor=on?'var(--accent)':'';
      x.style.color=on?'var(--accent)':'var(--muted)';
    });
  };
  chips.forEach(c=>c.addEventListener('click',()=>{
    scriptIdx=DATA.scripts.findIndex(s=>s.name===c.textContent.trim());
    stepIdx=0;paintChips();renderStep(ov);
  }));
  paintChips();
  // tally cards — every log is tagged to the selected script's source;
  // a small corner "−" undoes a mis-tap without leaving the session
  const keys=['contacts','conversations','leads','appointments'];
  const tallies=$$('.card.card-hover',ov).slice(0,4);
  tallies.forEach((c,i)=>{
    c.dataset.tally=keys[i];
    c.addEventListener('click',()=>{
      if(keys[i]==='contacts')bump('dials',1,battleSource()); // a contact is also a dial
      bump(keys[i],1,battleSource());
    });
    const head=$1('.flex.items-center.justify-between',c);
    if(head&&!$1('[data-minus]',head)){
      const minus=document.createElement('span');
      minus.dataset.minus='1';
      minus.textContent='−';
      minus.className='mono';
      minus.style.cssText='padding: 0 8px; font-size: 14px; line-height: 20px; color: var(--muted-2); border: 1px solid var(--border); border-radius: 7px; cursor: pointer;';
      head.appendChild(minus);
      minus.addEventListener('click',e=>{e.stopPropagation();bump(keys[i],-1);});
    }
  });
  // DIALS tally — same card idiom, first in the grid, D key
  const grid2=tallies[0]?tallies[0].parentNode:null;
  if(grid2&&!$1('[data-tally="dials"]',ov)){
    const dc=document.createElement('button');
    dc.className='card card-hover p-3.5 text-left';
    dc.style.cursor='pointer';
    dc.dataset.tally='dials';
    dc.innerHTML='<div class="flex items-center justify-between mb-1.5"><span class="eyebrow">Dials</span>'+
      '<span class="flex items-center gap-1"><span class="kbd">D</span>'+
      '<span data-minus="1" class="mono" style="padding: 0 8px; font-size: 14px; line-height: 20px; color: var(--muted-2); border: 1px solid var(--border); border-radius: 7px; cursor: pointer;">−</span></span></div>'+
      '<div class="flex items-baseline gap-2"><span class="mono text-[24px] font-semibold">0</span>'+
      '<span class="mono text-[11px]" style="color: var(--muted-2);">CR —</span></div>';
    grid2.insertBefore(dc,tallies[0]);
    dc.addEventListener('click',()=>bump('dials',1,battleSource()));
    $1('[data-minus]',dc).addEventListener('click',e=>{e.stopPropagation();bump('dials',-1);});
  }
  // PACE chip in the overlay header, next to the timer
  const head2=$1('.flex.items-center.gap-3:last-child',$1('.flex.items-center.justify-between.px-5',ov));
  if(head2&&!$1('#pace-chip',ov)){
    const chip=document.createElement('span');
    chip.id='pace-chip';
    chip.className='mono text-[11px] hidden sm:inline';
    chip.style.color='var(--muted)';
    head2.insertBefore(chip,head2.firstChild);
  }
  // WINGMAN — one-tap objection handles under the call flow
  const flowCard=$1('.card.p-5',ov);
  if(flowCard&&!$1('#wingman',ov)){
    const wm=document.createElement('div');
    wm.id='wingman';
    wm.className='card p-4 mt-2.5';
    wm.innerHTML='<div class="flex items-center justify-between mb-2"><div class="eyebrow" style="color: var(--warn, #F59E0B);">Wingman — they said…</div>'+
      '<span class="mono text-[9.5px]" style="color: var(--muted-2);">tap = instant handle</span></div>'+
      '<div class="flex gap-1.5 flex-wrap" id="wm-chips">'+
      DATA.objections.map(o=>'<button class="btn" data-obj="'+o.id+'" style="padding: 5px 11px; font-size: 11px; color: var(--muted);">'+esc(o.name)+'</button>').join('')+
      '</div><div id="wm-panel" style="display: none;" class="mt-3 pt-3" ></div>';
    flowCard.after(wm);
    $$('button[data-obj]',wm).forEach(b=>b.addEventListener('click',()=>{
      const o=DATA.objections.find(x=>x.id===b.dataset.obj);
      const panel=$1('#wm-panel',wm);
      /* telemetry: which objections actually occur, per source */
      const d=dayKey(),src=battleSource()||'other';
      S.objectionHits[d]=S.objectionHits[d]||{};
      S.objectionHits[d][src]=S.objectionHits[d][src]||{};
      S.objectionHits[d][src][o.id]=(S.objectionHits[d][src][o.id]||0)+1;
      save();
      panel.style.display='';
      panel.style.borderTop='1px solid var(--border)';
      panel.innerHTML='<p class="m-0 text-[12px] mb-2" style="color: var(--warn, #F59E0B); font-style: italic;">"'+esc(o.sellerSays)+'"</p>'+
        o.framework.map(f=>'<p class="m-0 text-[14.5px] leading-relaxed mb-2">'+esc(f)+'</p>').join('')+
        '<button class="btn" id="wm-close" style="padding: 3px 10px; font-size: 11px; color: var(--muted);">Back to flow</button>';
      $1('#wm-close',panel).addEventListener('click',()=>{panel.style.display='none';});
    }));
  }
}
function renderStep(ov){
  const sc=DATA.scripts[scriptIdx],st=sc.steps[stepIdx];
  const meta=$1('.flex.items-center.gap-2.mb-2',ov); // the step header row, NOT the chips row
  const pos=meta?$1('.mono.text-\\[11px\\]',meta):null;
  if(pos)pos.textContent=(stepIdx+1)+'/'+sc.steps.length;
  const lbl=meta?$1('.text-\\[13\\.5px\\].font-semibold',meta):null;
  if(lbl)lbl.textContent=st.label;
  const tagWrap=meta?$1('.flex.gap-1',meta):null;
  if(tagWrap)tagWrap.innerHTML=(st.tags||[]).map(t=>{
    const m=DATA.codes[t]||{name:t,short:''};
    return '<span class="mono" title="'+esc(m.name)+' — '+esc(m.short)+'" style="color: var(--accent); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 5px; padding: 1px 5px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; cursor: default;">'+esc(t)+'</span>';
  }).join('');
  const ps=$$('p',ov);
  const scriptP=ps.find(p=>p.className.includes('text-[15px]'));
  if(scriptP)scriptP.textContent=st.script;
  const noteP=ps.find(p=>p.getAttribute('style')&&p.getAttribute('style').includes('italic'));
  if(noteP){noteP.textContent=st.note||'';noteP.style.display=st.note?'':'none';}
  const fill=$1('.progress-fill',ov);
  if(fill)fill.style.width=((stepIdx+1)/sc.steps.length*100)+'%';
  const prev=$$('button',ov).find(b=>b.textContent.trim()==='← Prev');
  if(prev)prev.disabled=stepIdx===0;
}

const STAGE_ORDER=['HOT','WARM','NURTURE'];
let addStage='WARM';
function hydratePipeline(){
  const form=$$('.card.p-4',root)[0];

    if(val&&!val.value)val.value=S.settings.avgCheck;
    if(date&&!date.value)date.value=dayKey();
    const stageBtns=$$('button',form).filter(b=>['Hot','Warm','Seller Nurture'].includes(b.textContent.trim()));
    const addBtn=$$('button',form).find(b=>b.textContent.trim()==='Add');

    };
    stageBtns.forEach(b=>b.addEventListener('click',()=>{
      addStage=STAGE_ORDER.find(k=>STAGE_LABEL[k]===b.textContent.trim())||'WARM';paint();
    }));

      if(!name.value.trim())return;
